<script>
const CASE_DATA_PATH = "https://askep.mkhoirulzed.workers.dev/api/kasus";
const SDKI_DATA_PATH = "https://askep.mkhoirulzed.workers.dev/api/sdki";

let CASE_PACKAGES = [];
let activeCaseId = "";
let activeCategory = "Semua";
let focusDiagnosisMode = false;

const caseSearch = document.getElementById("caseSearch");
const categoryRow = document.getElementById("categoryRow");
const caseList = document.getElementById("caseList");
const detailPanel = document.getElementById("detailPanel");
const floatingAction = document.getElementById("floatingAction");
const caseCount = document.getElementById("caseCount");
const toast = document.getElementById("toast");
const toastText = document.getElementById("toastText");
const caseSectionTitle = document.getElementById("caseSectionTitle");

function normalizeText(text){
  return String(text || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^\w\s.-]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function escapeHtml(text){
  return String(text || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function slugify(text){
  return normalizeText(text)
    .replace(/[.\s/]+/g, "-")
    .replace(/^-+|-+$/g, "");
}

function showToast(message, icon = "fa-circle-check"){
  toastText.textContent = message;
  toast.querySelector("i").className = "fa-solid " + icon;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 1800);
}

function setFocusDiagnosisMode(value){
  focusDiagnosisMode = value;
  caseList.classList.toggle("is-hidden", focusDiagnosisMode);
  categoryRow.classList.toggle("is-hidden", focusDiagnosisMode);
  document.querySelector(".search-box").classList.toggle("is-hidden", focusDiagnosisMode);

  if(caseSectionTitle){
    caseSectionTitle.classList.toggle("is-hidden", focusDiagnosisMode);
  }

  if(floatingAction){
    floatingAction.classList.toggle("is-hidden", !focusDiagnosisMode);
  }
}

function scrollToDiagnosis(){
  setTimeout(() => {
    detailPanel.scrollIntoView({ behavior:"smooth", block:"start" });
  }, 80);
}

function showCaseList(){
  setFocusDiagnosisMode(false);
  setTimeout(() => {
    caseList.scrollIntoView({ behavior:"smooth", block:"start" });
  }, 80);
}

function focusCaseSearch(){
  setFocusDiagnosisMode(false);
  setTimeout(() => {
    caseSearch.focus();
    caseSearch.scrollIntoView({ behavior:"smooth", block:"center" });
  }, 80);
}

function getDiagnosisTitle(diagnosis){
  if(typeof diagnosis === "string") return diagnosis;
  return diagnosis?.title || diagnosis?.judulSdki || diagnosis?.judul || diagnosis?.namaDiagnosis || "";
}

function getDiagnosisCode(diagnosis){
  if(!diagnosis || typeof diagnosis === "string") return "";
  return diagnosis.kode || diagnosis.kodeSdki || diagnosis.code || "";
}

function normalizeDiagnosis(diagnosis){
  if(typeof diagnosis === "string"){
    return { kode:"", title:diagnosis.trim() };
  }

  return {
    kode:getDiagnosisCode(diagnosis),
    title:getDiagnosisTitle(diagnosis).trim()
  };
}

function extractArray(payload){
  if(Array.isArray(payload)) return payload;
  if(Array.isArray(payload?.data)) return payload.data;
  if(Array.isArray(payload?.items)) return payload.items;
  if(Array.isArray(payload?.result)) return payload.result;
  return [];
}

function getSdkiTitle(item){
  return item?.judulSdki || item?.judul || item?.namaDiagnosis || item?.title || item?.nama || "";
}

function getSdkiCode(item){
  return item?.kodeSdki || item?.kode || item?.code || "";
}

function splitConditionText(value){
  if(Array.isArray(value)) return value;
  if(typeof value !== "string") return [];
  return value
    .split(/\n|;|\|/g)
    .map(item => item.replace(/^[-•\d.)\s]+/, "").trim())
    .filter(Boolean);
}

function getClinicalConditions(item){
  const candidates = [
    item?.kondisiKlinisTerkait,
    item?.kondisiKlinis,
    item?.kondisiTerkait,
    item?.kondisi_klinis_terkait,
    item?.kondisi_klinis,
    item?.clinicalConditions,
    item?.relatedClinicalConditions,
    item?.detail?.kondisiKlinisTerkait,
    item?.detail?.kondisiKlinis
  ];

  for(const candidate of candidates){
    const conditions = splitConditionText(candidate)
      .map(condition => {
        if(typeof condition === "string") return condition.trim();
        return condition?.nama || condition?.title || condition?.kondisi || "";
      })
      .filter(Boolean);

    if(conditions.length) return conditions;
  }

  return [];
}

function normalizeManualCases(data){
  return data
    .map((item, index) => ({
      id:item.id || `manual-${slugify(item.title || item.nama || String(index + 1))}`,
      title:item.title || item.nama || item.kasus || `Kasus ${index + 1}`,
      kategori:item.kategori || item.category || "Paket Manual",
      source:"manual",
      description:item.description || item.deskripsi || "",
      aliases:Array.isArray(item.aliases) ? item.aliases : [],
      diagnoses:Array.isArray(item.diagnoses)
        ? item.diagnoses.map(normalizeDiagnosis).filter(d => d.title)
        : []
    }))
    .filter(item => item.title);
}

function generateCasesFromSdki(sdkiData){
  const caseMap = new Map();

  sdkiData.forEach(sdki => {
    const diagnosisTitle = getSdkiTitle(sdki).trim();
    const diagnosisCode = getSdkiCode(sdki).trim();
    const conditions = getClinicalConditions(sdki);

    if(!diagnosisTitle || !conditions.length) return;

    conditions.forEach(condition => {
      const title = String(condition || "").trim();
      const key = normalizeText(title);
      if(!key) return;

      if(!caseMap.has(key)){
        caseMap.set(key, {
          id:`sdki-${slugify(title)}`,
          title,
          kategori:"Kondisi Klinis SDKI",
          source:"sdki",
          aliases:[],
          diagnoses:[]
        });
      }

      const current = caseMap.get(key);
      const duplicate = current.diagnoses.some(diagnosis =>
        normalizeText(diagnosis.title) === normalizeText(diagnosisTitle)
      );

      if(!duplicate){
        current.diagnoses.push({ kode:diagnosisCode, title:diagnosisTitle });
      }
    });
  });

  return Array.from(caseMap.values()).sort((a, b) =>
    a.title.localeCompare(b.title, "id", { sensitivity:"base" })
  );
}

function mergeCasePackages(manualCases, automaticCases){
  const merged = new Map();

  [...automaticCases, ...manualCases].forEach(item => {
    const key = normalizeText(item.title);
    if(!key) return;

    if(!merged.has(key)){
      merged.set(key, {
        ...item,
        diagnoses:[...(item.diagnoses || [])]
      });
      return;
    }

    const existing = merged.get(key);

    (item.diagnoses || []).forEach(diagnosis => {
      const duplicate = existing.diagnoses.some(current =>
        normalizeText(current.title) === normalizeText(diagnosis.title)
      );
      if(!duplicate) existing.diagnoses.push(diagnosis);
    });

    if(item.source === "manual"){
      existing.id = item.id || existing.id;
      existing.kategori = item.kategori || existing.kategori;
      existing.description = item.description || existing.description;
      existing.aliases = [...new Set([...(existing.aliases || []), ...(item.aliases || [])])];
      existing.source = "gabungan";
    }
  });

  return Array.from(merged.values()).sort((a, b) => {
    const manualA = a.source === "manual" || a.source === "gabungan" ? 0 : 1;
    const manualB = b.source === "manual" || b.source === "gabungan" ? 0 : 1;
    return manualA - manualB || a.title.localeCompare(b.title, "id", { sensitivity:"base" });
  });
}

function getCategories(){
  const categories = CASE_PACKAGES.map(item => item.kategori || "Lainnya").filter(Boolean);
  return ["Semua", ...new Set(categories)];
}

function getFilteredCases(){
  const q = normalizeText(caseSearch.value);

  return CASE_PACKAGES.filter(item => {
    const matchCategory = activeCategory === "Semua" ||
      normalizeText(item.kategori || "Lainnya") === normalizeText(activeCategory);

    const diagnosisText = Array.isArray(item.diagnoses)
      ? item.diagnoses.map(getDiagnosisTitle).join(" ")
      : "";

    const text = normalizeText([
      item.title,
      item.kategori,
      ...(item.aliases || []),
      diagnosisText
    ].join(" "));

    return matchCategory && (!q || text.includes(q));
  });
}

function getActiveCase(){
  return CASE_PACKAGES.find(item => item.id === activeCaseId) || CASE_PACKAGES[0] || null;
}

function openSearchDiagnosis(diagnosis){
  location.href = `search.html?q=${encodeURIComponent(diagnosis)}`;
}

function openQuickAskep(){
  const active = getActiveCase();
  const firstDiagnosis = getDiagnosisTitle(active?.diagnoses?.[0]);
  location.href = `quick-askep.html?q=${encodeURIComponent(firstDiagnosis)}`;
}

function renderCategories(){
  const categories = getCategories();

  categoryRow.innerHTML = categories.map(category => `
    <button class="category-chip native-click ${category === activeCategory ? "active" : ""}" type="button" data-category="${escapeHtml(category)}">
      ${escapeHtml(category)}
    </button>
  `).join("");

  categoryRow.querySelectorAll(".category-chip").forEach(btn => {
    btn.addEventListener("click", () => {
      activeCategory = btn.dataset.category;
      setFocusDiagnosisMode(false);
      renderCategories();
      renderCases();
    });
  });
}

function renderCases(){
  const items = getFilteredCases();
  caseCount.textContent = `${items.length} kasus`;

  if(!items.length){
    caseList.innerHTML = "";
    detailPanel.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><i class="fa-solid fa-magnifying-glass"></i></div>
        <div class="empty-title">Kasus tidak ditemukan</div>
        <div class="empty-desc">Coba kata kunci lain seperti stroke, DM, pneumonia, atau sesak.</div>
      </div>`;
    return;
  }

  if(!items.some(item => item.id === activeCaseId)) activeCaseId = items[0].id;

  caseList.innerHTML = items.map(item => `
    <button class="case-list-item native-click ${item.id === activeCaseId ? "active" : ""}" type="button" data-id="${escapeHtml(item.id)}">
      <div class="case-main">
        <div class="case-title-row">
          <div class="case-title">${escapeHtml(item.title)}</div>
          <div class="case-category">${escapeHtml(item.kategori || "Lainnya")}</div>
        </div>
      </div>
      <div class="case-meta">${item.diagnoses?.length || 0}</div>
    </button>`).join("");

  caseList.querySelectorAll(".case-list-item").forEach(btn => {
    btn.addEventListener("click", () => {
      activeCaseId = btn.dataset.id;
      setFocusDiagnosisMode(true);
      renderCases();
      renderDetail();
      scrollToDiagnosis();
      showToast("Diagnosis terkait ditampilkan");
    });
  });

  renderDetail();
}

function renderDetail(){
  const item = getActiveCase();

  if(!item){
    detailPanel.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><i class="fa-solid fa-file-circle-xmark"></i></div>
        <div class="empty-title">Data kasus belum tersedia</div>
        <div class="empty-desc">Data kasus dan kondisi klinis SDKI belum tersedia.</div>
      </div>`;
    return;
  }

  const diagnoses = Array.isArray(item.diagnoses) ? item.diagnoses : [];

  detailPanel.innerHTML = `
    <div class="panel-card">
      <div class="panel-head">
        <div class="panel-badge"><span>${escapeHtml(item.kategori || "Paket Kasus")}</span></div>
        <div class="panel-title">${escapeHtml(item.title)}</div>
      </div>

      <div class="panel-body">
        <div class="focus-note">
          <i class="fa-solid fa-circle-info"></i>
          <span>Diagnosis berikut merupakan diagnosis yang berpotensi terkait. Tetapkan diagnosis berdasarkan hasil pengkajian pasien.</span>
        </div>

        <div class="section-title" style="margin-top:0;">
          <span><i class="fa-solid fa-stethoscope"></i> Diagnosis terkait</span>
          <span class="count">${diagnoses.length} item</span>
        </div>

        <div class="diagnosis-list">
          ${diagnoses.map((diagnosis, index) => {
            const title = getDiagnosisTitle(diagnosis);
            const code = getDiagnosisCode(diagnosis);
            return `
              <button class="diagnosis-card native-click" type="button" data-diagnosis="${escapeHtml(title)}">
                <div class="diagnosis-number">${index + 1}</div>
                <div class="diagnosis-body">
                  <div class="diagnosis-title">${escapeHtml(title)}</div>
                  <div class="diagnosis-desc">${code ? `${escapeHtml(code)} · ` : ""}Ketuk untuk membuka pencarian diagnosis ini.</div>
                </div>
                <i class="fa-solid fa-chevron-right chevron"></i>
              </button>`;
          }).join("")}
        </div>
      </div>
    </div>`;

  detailPanel.querySelectorAll(".diagnosis-card").forEach(btn => {
    btn.addEventListener("click", () => openSearchDiagnosis(btn.dataset.diagnosis));
  });
}

async function fetchJson(url){
  const response = await fetch(url, { cache:"no-store" });
  if(!response.ok) throw new Error(`HTTP ${response.status} saat memuat ${url}`);
  return extractArray(await response.json());
}

async function loadCases(){
  try{
    const [manualResult, sdkiResult] = await Promise.allSettled([
      fetchJson(CASE_DATA_PATH),
      fetchJson(SDKI_DATA_PATH)
    ]);

    const manualData = manualResult.status === "fulfilled" ? manualResult.value : [];
    const sdkiData = sdkiResult.status === "fulfilled" ? sdkiResult.value : [];

    if(manualResult.status === "rejected") console.warn("Kasus manual gagal dimuat:", manualResult.reason);
    if(sdkiResult.status === "rejected") console.warn("SDKI gagal dimuat:", sdkiResult.reason);

    const manualCases = normalizeManualCases(manualData);
    const automaticCases = generateCasesFromSdki(sdkiData);
    CASE_PACKAGES = mergeCasePackages(manualCases, automaticCases);

    if(!CASE_PACKAGES.length){
      throw new Error("Data kasus dan kondisi klinis SDKI kosong atau formatnya tidak dikenali.");
    }

    activeCaseId = CASE_PACKAGES[0]?.id || "";
    renderCategories();
    renderCases();
  }catch(error){
    console.error(error);
    caseCount.textContent = "0 kasus";
    categoryRow.innerHTML = "";
    caseList.innerHTML = "";
    detailPanel.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
        <div class="empty-title">Gagal memuat data kasus</div>
        <div class="empty-desc">Pastikan endpoint <b>/api/kasus</b> dan <b>/api/sdki</b> tersedia serta kondisi klinis terkait terdapat di dalam data SDKI.</div>
      </div>`;
  }
}

let searchTimer = null;
caseSearch.addEventListener("input", () => {
  clearTimeout(searchTimer);
  setFocusDiagnosisMode(false);
  searchTimer = setTimeout(renderCases, 150);
});

document.addEventListener("click", function(e){
  const el = e.target.closest(".native-click");
  if(!el) return;

  el.querySelector(".ripple")?.remove();
  const ripple = document.createElement("span");
  ripple.className = "ripple";

  const rect = el.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  ripple.style.width = ripple.style.height = size + "px";
  ripple.style.left = (e.clientX - rect.left - size / 2) + "px";
  ripple.style.top = (e.clientY - rect.top - size / 2) + "px";
  el.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);
});

document.addEventListener("selectstart", function(e){
  if(!e.target.closest("input, textarea, select")) e.preventDefault();
});

document.getElementById("lihatKasusBtn").addEventListener("click", showCaseList);
document.getElementById("cariKasusBtn").addEventListener("click", focusCaseSearch);
document.getElementById("quickAskepBtn").addEventListener("click", openQuickAskep);
loadCases();
</script>
