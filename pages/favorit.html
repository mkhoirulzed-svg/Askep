<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Favorite</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css?v=2">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --primary:#2563eb;
  --primary-soft:#eff6ff;
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
  --danger:#ef4444;
  --shadow-sm:0 6px 16px rgba(15,23,42,.08);
  --shadow-md:0 14px 30px rgba(15,23,42,.12);
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,
body{
  margin:0;
  min-height:100%;
  font-family:"Plus Jakarta Sans",system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  user-select:none;
}

input,
textarea,
select{
  user-select:text;
}

button,
a{
  -webkit-user-select:none;
  user-select:none;
}

body{
  padding-bottom:96px;
}

.page-favorite{
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(37,99,235,.12), transparent 32%),
    var(--bg);
}

.favorite-container{
  width:100%;
  max-width:720px;
  margin:0 auto;
  padding:18px 16px 110px;
}

/* Header */
.app-header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:18px;
}

.nav-btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:15px;
  background:var(--card);
  color:var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:var(--shadow-sm);
  cursor:pointer;
}

.header-text{
  flex:1;
}

.header-title{
  margin:0;
  font-size:22px;
  font-weight:800;
  letter-spacing:-.02em;
}

.header-subtitle{
  margin:3px 0 0;
  font-size:13px;
  color:var(--muted);
}

/* Search */
.search-box{
  position:relative;
  margin-bottom:14px;
}

.search-box i{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  color:var(--muted);
  font-size:14px;
}

.search-input{
  width:100%;
  height:48px;
  border:none;
  outline:none;
  border-radius:17px;
  background:var(--card);
  box-shadow:var(--shadow-sm);
  padding:0 16px 0 42px;
  font-size:14px;
  color:var(--text);
}

.search-input::placeholder{
  color:#94a3b8;
}

/* Summary */
.summary-card{
  background:linear-gradient(135deg, var(--primary), #1d4ed8);
  color:white;
  border-radius:22px;
  padding:18px;
  box-shadow:var(--shadow-md);
  margin-bottom:16px;
}

.summary-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.summary-title{
  font-size:15px;
  font-weight:700;
}

.summary-count{
  font-size:28px;
  font-weight:800;
  line-height:1;
}

.summary-desc{
  margin:9px 0 0;
  font-size:13px;
  color:rgba(255,255,255,.84);
  line-height:1.5;
}

/* Filter */
.filter-row{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:2px 0 14px;
  scrollbar-width:none;
}

.filter-row::-webkit-scrollbar{
  display:none;
}

.filter-chip{
  flex:0 0 auto;
  border:none;
  border-radius:999px;
  padding:9px 13px;
  font-size:12px;
  font-weight:700;
  color:var(--muted);
  background:var(--card);
  box-shadow:var(--shadow-sm);
  cursor:pointer;
}

.filter-chip.active{
  background:var(--primary);
  color:white;
}

/* Favorite list */
.favorite-list{
  display:grid;
  gap:12px;
}

.favorite-card{
  position:relative;
  display:flex;
  gap:13px;
  align-items:flex-start;
  background:var(--card);
  border-radius:20px;
  padding:15px;
  box-shadow:var(--shadow-sm);
  cursor:pointer;
  transition:.18s ease;
}

.favorite-card:active{
  transform:scale(.985);
}

.favorite-icon{
  width:42px;
  height:42px;
  border-radius:15px;
  background:var(--primary-soft);
  color:var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;
  flex:0 0 auto;
}

.favorite-content{
  flex:1;
  min-width:0;
}

.favorite-type{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:5px 9px;
  border-radius:999px;
  background:#f1f5f9;
  color:var(--muted);
  font-size:11px;
  font-weight:800;
  margin-bottom:7px;
  text-transform:uppercase;
  letter-spacing:.03em;
}

.favorite-name{
  font-size:15px;
  font-weight:800;
  line-height:1.35;
  margin-bottom:4px;
}

.favorite-code{
  font-size:12px;
  color:var(--muted);
  line-height:1.4;
}

.favorite-desc{
  margin-top:7px;
  font-size:12px;
  color:var(--muted);
  line-height:1.5;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.remove-btn{
  width:34px;
  height:34px;
  border:none;
  border-radius:13px;
  background:#fef2f2;
  color:var(--danger);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex:0 0 auto;
}

.empty-state{
  background:var(--card);
  border-radius:24px;
  padding:34px 22px;
  text-align:center;
  box-shadow:var(--shadow-sm);
}

.empty-icon{
  width:72px;
  height:72px;
  border-radius:24px;
  background:var(--primary-soft);
  color:var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 16px;
  font-size:28px;
}

.empty-title{
  font-size:17px;
  font-weight:800;
  margin-bottom:7px;
}

.empty-desc{
  font-size:13px;
  color:var(--muted);
  line-height:1.6;
  margin:0;
}

.clear-btn{
  width:100%;
  height:46px;
  border:none;
  border-radius:17px;
  background:#fff1f2;
  color:#e11d48;
  font-weight:800;
  margin-top:16px;
  box-shadow:var(--shadow-sm);
  cursor:pointer;
  display:none;
}

.clear-btn.show{
  display:block;
}

/* Bottom nav */
.bottom-nav{
  position:fixed;
  left:50%;
  bottom:14px;
  transform:translateX(-50%);
  width:calc(100% - 28px);
  max-width:720px;
  height:68px;
  background:rgba(255,255,255,.94);
  backdrop-filter:blur(16px);
  border:1px solid rgba(226,232,240,.9);
  border-radius:24px;
  box-shadow:0 18px 35px rgba(15,23,42,.16);
  display:grid;
  grid-template-columns:repeat(4,1fr);
  padding:8px;
  z-index:50;
}

.bottom-item{
  border:none;
  background:transparent;
  color:#94a3b8;
  text-decoration:none;
  border-radius:18px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  font-size:11px;
  font-weight:800;
  cursor:pointer;
}

.bottom-item i{
  font-size:17px;
}

.bottom-item.active{
  background:var(--primary-soft);
  color:var(--primary);
}

.native-click{
  transition:.16s ease;
}

.native-click:active{
  transform:scale(.94);
}

@media (max-width:380px){
  .header-title{
    font-size:20px;
  }

  .favorite-container{
    padding-left:14px;
    padding-right:14px;
  }

  .bottom-nav{
    width:calc(100% - 20px);
  }
}
</style>
</head>

<body>
<div class="page-favorite">
  <main class="favorite-container">

    <header class="app-header">
      <button class="nav-btn native-click" onclick="history.back()" aria-label="Kembali">
        <i class="fa-solid fa-arrow-left"></i>
      </button>

      <div class="header-text">
        <h1 class="header-title">Favorite</h1>
        <p class="header-subtitle">Daftar SDKI, SLKI, dan SIKI yang kamu simpan.</p>
      </div>
    </header>

    <section class="summary-card">
      <div class="summary-top">
        <div>
          <div class="summary-title">Total Favorite</div>
          <p class="summary-desc">Item yang sering kamu buka akan lebih cepat ditemukan di sini.</p>
        </div>
        <div class="summary-count" id="favoriteCount">0</div>
      </div>
    </section>

    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input
        id="searchInput"
        class="search-input"
        type="search"
        placeholder="Cari favorite..."
        autocomplete="off"
      />
    </div>

    <div class="filter-row">
      <button class="filter-chip active native-click" data-filter="all">Semua</button>
      <button class="filter-chip native-click" data-filter="sdki">SDKI</button>
      <button class="filter-chip native-click" data-filter="slki">SLKI</button>
      <button class="filter-chip native-click" data-filter="siki">SIKI</button>
    </div>

    <section id="favoriteList" class="favorite-list"></section>

    <button id="clearAllBtn" class="clear-btn native-click">
      <i class="fa-solid fa-trash"></i>
      Hapus Semua Favorite
    </button>

  </main>

  <nav class="bottom-nav">
    <a href="../index.html" class="bottom-item native-click">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </a>

    <a href="search.html" class="bottom-item native-click">
      <i class="fa-solid fa-magnifying-glass"></i>
      <span>Cari</span>
    </a>

    <a href="favorite.html" class="bottom-item active native-click">
      <i class="fa-solid fa-heart"></i>
      <span>Favorite</span>
    </a>

    <a href="profil.html" class="bottom-item native-click">
      <i class="fa-solid fa-user"></i>
      <span>Profil</span>
    </a>
  </nav>
</div>

<script>
const STORAGE_KEYS = [
  "favorites",
  "zed_favorites",
  "favoriteItems",
  "sdkislki_favorites"
];

const PAGE_BY_TYPE = {
  sdki: "diagnosis-detail.html",
  slki: "slki-detail.html",
  siki: "siki-detail.html"
};

let favorites = [];
let activeFilter = "all";

const favoriteList = document.getElementById("favoriteList");
const favoriteCount = document.getElementById("favoriteCount");
const searchInput = document.getElementById("searchInput");
const clearAllBtn = document.getElementById("clearAllBtn");
const filterChips = document.querySelectorAll(".filter-chip");

function getStorageKey(){
  for(const key of STORAGE_KEYS){
    const value = localStorage.getItem(key);
    if(value) return key;
  }

  return "sdkislki_favorites";
}

function loadFavorites(){
  const key = getStorageKey();

  try{
    const raw = localStorage.getItem(key);
    const parsed = raw ? JSON.parse(raw) : [];

    if(Array.isArray(parsed)){
      favorites = normalizeFavorites(parsed);
    }else if(parsed && typeof parsed === "object"){
      favorites = normalizeFavorites(Object.values(parsed));
    }else{
      favorites = [];
    }
  }catch(error){
    console.warn("Gagal membaca favorite:", error);
    favorites = [];
  }
}

function saveFavorites(){
  localStorage.setItem(getStorageKey(), JSON.stringify(favorites));
}

function normalizeFavorites(items){
  return items
    .filter(Boolean)
    .map((item, index) => {
      const type = String(
        item.type ||
        item.jenis ||
        item.kategoriData ||
        item.source ||
        ""
      ).toLowerCase();

      return {
        id: item.id || item.slug || item.kode || item.nama || `favorite-${index}`,
        type: ["sdki", "slki", "siki"].includes(type) ? type : guessType(item),
        kode: item.kode || item.code || "",
        nama: item.nama || item.name || item.judul || item.title || "Tanpa Nama",
        deskripsi: item.definisi || item.deskripsi || item.description || item.keterangan || "",
        url: item.url || item.href || ""
      };
    });
}

function guessType(item){
  const kode = String(item.kode || "").toUpperCase();

  if(kode.startsWith("D.")) return "sdki";
  if(kode.startsWith("L.")) return "slki";
  if(kode.startsWith("I.") || kode.startsWith("1.") || kode.startsWith("I")) return "siki";

  return "sdki";
}

function getTypeLabel(type){
  if(type === "sdki") return "SDKI";
  if(type === "slki") return "SLKI";
  if(type === "siki") return "SIKI";
  return "DATA";
}

function getTypeIcon(type){
  if(type === "sdki") return "fa-stethoscope";
  if(type === "slki") return "fa-chart-line";
  if(type === "siki") return "fa-list-check";
  return "fa-book-medical";
}

function getDetailUrl(item){
  if(item.url) return item.url;

  const page = PAGE_BY_TYPE[item.type] || "diagnosis-detail.html";
  const id = encodeURIComponent(item.id || item.kode || item.nama);

  return `${page}?id=${id}`;
}

function renderFavorites(){
  const keyword = searchInput.value.trim().toLowerCase();

  const filtered = favorites.filter(item => {
    const matchFilter = activeFilter === "all" || item.type === activeFilter;

    const text = [
      item.nama,
      item.kode,
      item.deskripsi,
      item.type
    ].join(" ").toLowerCase();

    const matchSearch = !keyword || text.includes(keyword);

    return matchFilter && matchSearch;
  });

  favoriteCount.textContent = favorites.length;
  clearAllBtn.classList.toggle("show", favorites.length > 0);

  if(favorites.length === 0){
    favoriteList.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">
          <i class="fa-solid fa-heart"></i>
        </div>
        <div class="empty-title">Belum ada favorite</div>
        <p class="empty-desc">
          Simpan diagnosis, luaran, atau intervensi yang sering kamu gunakan agar lebih cepat dibuka kembali.
        </p>
      </div>
    `;
    return;
  }

  if(filtered.length === 0){
    favoriteList.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">
          <i class="fa-solid fa-magnifying-glass"></i>
        </div>
        <div class="empty-title">Tidak ditemukan</div>
        <p class="empty-desc">
          Coba gunakan kata kunci lain atau ubah filter favorite.
        </p>
      </div>
    `;
    return;
  }

  favoriteList.innerHTML = filtered.map(item => `
    <article class="favorite-card native-click" onclick="openFavorite('${escapeAttr(getDetailUrl(item))}')">
      <div class="favorite-icon">
        <i class="fa-solid ${getTypeIcon(item.type)}"></i>
      </div>

      <div class="favorite-content">
        <div class="favorite-type">
          <i class="fa-solid fa-bookmark"></i>
          ${getTypeLabel(item.type)}
        </div>

        <div class="favorite-name">${escapeHtml(item.nama)}</div>

        ${item.kode ? `<div class="favorite-code">${escapeHtml(item.kode)}</div>` : ""}

        ${item.deskripsi ? `<div class="favorite-desc">${escapeHtml(item.deskripsi)}</div>` : ""}
      </div>

      <button class="remove-btn native-click" onclick="removeFavorite(event, '${escapeAttr(item.id)}')" aria-label="Hapus favorite">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </article>
  `).join("");
}

function openFavorite(url){
  location.href = url;
}

function removeFavorite(event, id){
  event.stopPropagation();

  favorites = favorites.filter(item => String(item.id) !== String(id));
  saveFavorites();
  renderFavorites();
}

clearAllBtn.addEventListener("click", () => {
  if(!favorites.length) return;

  const ok = confirm("Hapus semua favorite?");
  if(!ok) return;

  favorites = [];
  saveFavorites();
  renderFavorites();
});

searchInput.addEventListener("input", renderFavorites);

filterChips.forEach(chip => {
  chip.addEventListener("click", () => {
    filterChips.forEach(c => c.classList.remove("active"));
    chip.classList.add("active");

    activeFilter = chip.dataset.filter;
    renderFavorites();
  });
});

function escapeHtml(value){
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function escapeAttr(value){
  return escapeHtml(value).replaceAll("`", "&#096;");
}

loadFavorites();
renderFavorites();
</script>
</body>
</html>
