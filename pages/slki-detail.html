<!DOCTYPE html>

<head>

<style>
:root{
  --primary:#16a34a;
  --primary-dark:#15803d;
  --primary-soft:#bbf7d0;
  --primary-light:#f0fdf4;

  --bg:#f7fee7;

  --warning:#f59e0b;

  --radius-sm:12px;

  --shadow-sm:0 4px 14px rgba(20,83,45,.07);
  --shadow-md:0 10px 28px rgba(20,83,45,.10);

}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  font-family:"Plus Jakarta Sans",system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overscroll-behavior:none;
}

body,
button,
a,
.card,
.detail-card,
.indicator-card,
.bottom-item,
.native-click{
  user-select:none;
  -webkit-user-select:none;
  -ms-user-select:none;
}

input,
textarea,
select{
  user-select:text;
  -webkit-user-select:text;
}

a{
  color:inherit;
  text-decoration:none;
}

button{
  font:inherit;
  cursor:pointer;
}

.app{
  max-width:520px;
  margin:0 auto;
  min-height:100vh;
  background:linear-gradient(180deg,var(--primary-light) 0%,var(--bg) 280px);
  padding-bottom:calc(var(--bottom-nav-height) + env(safe-area-inset-bottom) + 20px);
}

.header{
  padding:18px 18px 14px;
}

.topbar{

  gap:12px;
  margin-bottom:16px;
}

.nav-btn{
  width:44px;

  color:var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;

}

.header-title{

}

.header-title h1{

.header-title p{
  font-size:12px;

.content{

.hero-card{

.badge{

}

.meta-grid{
  display:grid;

.meta-card{

.meta-label{

}

.meta-value{

}

.section-title{

.detail-card{

.detail-text{

.simple-list{

.indicator-group{

.indicator-card{

.indicator-icon{

  display:flex;

.scale-box{
  display:grid;

}

.scale-item{

  border-radius:50%;

.scale-label{

  font-weight:700;

}

.related-card{
  display:flex;
  align-items:flex-start;
  gap:12px;
  background:var(--card);
  border:1px solid var(--border);

  padding:14px;
  box-shadow:var(--shadow-sm);
  margin-bottom:10px;

  overflow:hidden;
}

.related-icon{
  width:42px;
  height:42px;
  border-radius:15px;
  background:var(--primary-light);
  color:var(--primary);

  align-items:center;

  flex-shrink:0;
}

.related-body{
  flex:1;
  min-width:0;
}

.related-title{
  font-size:13px;
  font-weight:800;
  line-height:1.35;
}

.related-desc{
  font-size:11px;
  color:var(--muted);
  margin-top:4px;
}

.chevron{
  color:#94a3b8;
  margin-top:12px;
}

.empty-state{
  text-align:center;
  padding:42px 18px;
  color:var(--muted);
}

.empty-icon{
  width:70px;
  height:70px;
  border-radius:24px;
  background:#ecfdf5;
  color:var(--success);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 14px;
  font-size:28px;
}

.empty-title{
  font-size:15px;
  font-weight:800;
  color:var(--text);
  margin-bottom:6px;
}

.empty-desc{
  font-size:12px;
  line-height:1.55;
}

.loading{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  color:var(--muted);
  font-size:13px;
  padding:40px 0;
}

.spinner{
  width:18px;
  height:18px;
  border:3px solid #bbf7d0;
  border-top-color:var(--success);
  border-radius:50%;
  animation:spin .8s linear infinite;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

.native-click{
  position:relative;
  overflow:hidden;
  cursor:pointer;
  touch-action:manipulation;
}

.native-click:active{
  transform:scale(.985);
}

.ripple{
  position:absolute;
  border-radius:50%;
  transform:scale(0);
  animation:ripple .55s linear;
  background:rgba(22,163,74,.18);
  pointer-events:none;
}

@keyframes ripple{
  to{
    transform:scale(4);
    opacity:0;
  }
}

.bottom-nav{
  position:fixed;
  left:50%;
  bottom:0;
  transform:translateX(-50%);
  width:100%;
  max-width:520px;
  height:calc(var(--bottom-nav-height) + env(safe-area-inset-bottom));

  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-top:1px solid var(--border);
  display:grid;
  grid-template-columns:repeat(4,1fr);
  padding:8px 8px calc(8px + env(safe-area-inset-bottom));

}

.bottom-item{
  border:0;
  background:transparent;
  color:var(--muted);
  border-radius:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  font-size:11px;
  font-weight:700;
  position:relative;
  overflow:hidden;
}

.bottom-item i{
  font-size:18px;
}

.bottom-item.active{
  color:var(--primary);
  background:var(--primary-light);

<body>

<div class="app">

  <header class="header">
    <div class="topbar">
      <button class="nav-btn native-click" onclick="history.back()" aria-label="Kembali">
        <i class="fa-solid fa-arrow-left"></i>
      </button>

      <div class="header-title">
        <h1>Detail SLKI</h1>
        <p id="headerSub">Standar Luaran Keperawatan Indonesia</p>
      </div>

      <a href="search.html" class="nav-btn native-click" aria-label="Cari">

      </a>
    </div>

  <main class="content">

      <div class="spinner"></div>

    <div id="detailArea"></div>
  </main>

    <i class="fa-solid fa-magnifying-glass"></i>

    <i class="fa-solid fa-notes-medical"></i>
    <span>Askep</span>
  </a>

  <a href="profil.html" class="bottom-item native-click">
    <i class="fa-solid fa-user-nurse"></i>
    <span>Profil</span>

<script>
const API_BASE = "https://askep.mkhoirulzed.workers.dev";

const API_ENDPOINTS = {
  sdki: `${API_BASE}/api/sdki`,
  slki: `${API_BASE}/api/slki`,
  siki: `${API_BASE}/api/siki`,
  relations: `${API_BASE}/api/relations`
};

/* =========================
   ELEMENT
========================= */
const loadingEl = document.getElementById("loading");
const detailArea = document.getElementById("detailArea");
const headerSub = document.getElementById("headerSub");

/* =========================
   PARAMETER URL
========================= */
const params = new URLSearchParams(window.location.search);

const detailId =
  params.get("id") ||
  params.get("kode") ||
  params.get("q") ||
  "";

/* =========================
   HELPERS
========================= */
function normalizeText(text) {
  return String(text || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^\w\s.-]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function pick(obj, keys) {
  for (const key of keys) {
    if (
      obj &&
      obj[key] !== undefined &&
      obj[key] !== null &&
      obj[key] !== ""
    ) {
      return obj[key];
    }
  }

  return "";
}

function toArray(data) {
  if (Array.isArray(data)) {
    return data;
  }

  if (!data || typeof data !== "object") {
    return [];
  }

  const candidates = [
    data.data,
    data.items,
    data.luaran,
    data.slki,
    data.outcomes,
    data.result,
    data.results
  ];

  for (const candidate of candidates) {
    if (Array.isArray(candidate)) {
      return candidate;
    }
  }

  const values = Object.values(data);

  if (
    values.length &&
    values.every(
      value =>
        value &&
        typeof value === "object" &&
        !Array.isArray(value)
    )
  ) {
    return values;
  }

  return [];
}

function stringifyDeep(value) {
  if (value === null || value === undefined) {
    return "";
  }

  if (
    typeof value === "string" ||
    typeof value === "number" ||
    typeof value === "boolean"
  ) {
    return String(value);
  }

  if (Array.isArray(value)) {
    return value.map(stringifyDeep).join(" ");
  }

  if (typeof value === "object") {
    return Object.values(value)
      .map(stringifyDeep)
      .join(" ");
  }

  return "";
}

function escapeHtml(text) {
  return String(text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function getItemId(item) {
  return pick(item, [
    "id",
    "kode",
    "kodeSlki",
    "kode_slki",
    "code",
    "nomor",
    "no"
  ]);
}

function getItemTitle(item) {
  return pick(item, [
    "judulSlki",
    "judul_slki",
    "namaLuaran",
    "nama_luaran",
    "title",
    "judul",
    "nama",
    "luaran",
    "outcome",
    "label",
    "name"
  ]);
}

function getItemDesc(item) {
  return pick(item, [
    "definisi",
    "deskripsi",
    "description",
    "keterangan"
  ]);
}

function getItemCategory(item) {
  return pick(item, [
    "kategori",
    "category",
    "kelompok",
    "domain"
  ]);
}

function getItemSubCategory(item) {
  return pick(item, [
    "subkategori",
    "subKategori",
    "sub_kategori",
    "sub_category",
    "subCategory",
    "kelas",
    "class"
  ]);
}

function getEkspektasi(item) {
  return pick(item, [
    "ekspektasi",
    "harapan",
    "expectation",
    "target",
    "arah"
  ]);
}

function arrayFromUnknown(value) {
  if (
    value === null ||
    value === undefined ||
    value === ""
  ) {
    return [];
  }

  if (Array.isArray(value)) {
    return value
      .map(item => {
        if (
          typeof item === "string" ||
          typeof item === "number"
        ) {
          return String(item);
        }

        if (item && typeof item === "object") {
          return pick(item, [
            "indikator",
            "nama",
            "judul",
            "label",
            "text",
            "kriteria"
          ]) || stringifyDeep(item);
        }

        return "";
      })
      .filter(Boolean);
  }

  if (typeof value === "string") {
    return value
      .split(/\n|;|\|/g)
      .map(item => item.trim())
      .filter(Boolean);
  }

  if (typeof value === "object") {
    return Object.values(value)
      .map(stringifyDeep)
      .filter(Boolean);
  }

  return [String(value)];
}

function getIndicators(item) {
  const direct = pick(item, [
    "indikator",
    "indikators",
    "indicators",
    "kriteria",
    "kriteriaHasil",
    "kriteria_hasil",
    "outcomeIndicator",
    "outcome_indicator"
  ]);

  const directArray = arrayFromUnknown(direct);

  if (directArray.length) {
    return directArray;
  }

  const nested =
    item.luaran ||
    item.detail ||
    item.data ||
    null;

  if (nested && typeof nested === "object") {
    const nestedValue = pick(nested, [
      "indikator",
      "indikators",
      "indicators",
      "kriteria",
      "kriteriaHasil",
      "kriteria_hasil"
    ]);

    return arrayFromUnknown(nestedValue);
  }

  return [];
}

function getSkala(item) {
  const scale = pick(item, [
    "skala",
    "skalaPenilaian",
    "skala_penilaian",
    "scale",
    "penilaian"
  ]);

  const scaleArray = arrayFromUnknown(scale);

  if (scaleArray.length) {
    return scaleArray;
  }

  return [
    "Menurun",
    "Cukup menurun",
    "Sedang",
    "Cukup meningkat",
    "Meningkat"
  ];
}

function findSlkiItem(list, id) {
  const target = normalizeText(id);

  if (!target) {
    return null;
  }

  const exact = list.find(item => {
    const itemId = normalizeText(getItemId(item));
    const title = normalizeText(getItemTitle(item));

    return itemId === target || title === target;
  });

  if (exact) {
    return exact;
  }

  return list.find(item => {
    const itemId = normalizeText(getItemId(item));
    const title = normalizeText(getItemTitle(item));

    return (
      itemId.includes(target) ||
      title.includes(target)
    );
  }) || null;
}

function findRelatedDiagnoses(sdkiList, slkiItem) {
  const slkiId = normalizeText(getItemId(slkiItem));
  const slkiTitle = normalizeText(
    getItemTitle(slkiItem)
  );

  if (!slkiId && !slkiTitle) {
    return [];
  }

  return sdkiList
    .filter(row => {
      const text = normalizeText(
        stringifyDeep(row)
      );

      return (
        (slkiId && text.includes(slkiId)) ||
        (slkiTitle && text.includes(slkiTitle))
      );
    })
    .slice(0, 8);
}

async function fetchJsonSafe(url) {
  const separator = url.includes("?") ? "&" : "?";

  const response = await fetch(
    `${url}${separator}v=${Date.now()}`,
    {
      method: "GET",
      headers: {
        Accept: "application/json"
      },
      cache: "no-store"
    }
  );

  const rawText = await response.text();

  if (!response.ok) {
    throw new Error(
      `HTTP ${response.status}: ${
        rawText || response.statusText
      }`
    );
  }

  if (!rawText.trim()) {
    throw new Error("Respons API kosong.");
  }

  let json;

  try {
    json = JSON.parse(rawText);
  } catch {
    throw new Error(
      "Respons API bukan JSON yang valid."
    );
  }

  if (
    json &&
    typeof json === "object" &&
    json.success === false
  ) {
    throw new Error(
      json.message ||
      "API mengembalikan status gagal."
    );
  }

  return json;
}

/* =========================
   RENDER
========================= */
function renderEmpty(title, description) {
  detailArea.innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">
        <i class="fa-solid fa-circle-exclamation"></i>
      </div>

      <div class="empty-title">
        ${escapeHtml(title)}
      </div>

      <div class="empty-desc">
        ${escapeHtml(description)}
      </div>
    </div>
  `;
}

function renderTextSection(title, icon, text) {
  if (!text) {
    return "";
  }

  return `
    <section>
      <div class="section-title">
        <i class="fa-solid ${icon}"></i>
        <span>${escapeHtml(title)}</span>
      </div>

      <div class="detail-card">
        <div class="detail-text">
          ${escapeHtml(text)}
        </div>
      </div>
    </section>
  `;
}

function renderIndicators(items) {
  if (!items || !items.length) {
    return "";
  }

  return `
    <section>
      <div class="section-title">
        <i class="fa-solid fa-list-check"></i>
        <span>Indikator Luaran</span>
      </div>

      <div class="indicator-group">
        <div class="indicator-card">
          <div class="indicator-head">
            <div class="indicator-icon">
              <i class="fa-solid fa-chart-line"></i>
            </div>

            <div class="indicator-title">
              Kriteria Hasil / Indikator
            </div>
          </div>

          <ol class="indicator-list">
            ${items
              .map(
                item =>
                  `<li>${escapeHtml(item)}</li>`
              )
              .join("")}
          </ol>
        </div>
      </div>
    </section>
  `;
}

function renderScale(items) {
  if (!items || !items.length) {
    return "";
  }

  const list = items.slice(0, 5);

  return `
    <section>
      <div class="section-title">
        <i class="fa-solid fa-sliders"></i>
        <span>Skala Penilaian</span>
      </div>

      <div class="detail-card">
        <div class="scale-box">
          ${list
            .map(
              (item, index) => `
                <div class="scale-item">
                  <div class="scale-number">
                    ${index + 1}
                  </div>

                  <div class="scale-label">
                    ${escapeHtml(item)}
                  </div>
                </div>
              `
            )
            .join("")}
        </div>
      </div>
    </section>
  `;
}

function getRelatedTitle(row) {
  return pick(row, [
    "judulSdki",
    "judul_sdki",
    "diagnosis",
    "diagnosa",
    "namaDiagnosis",
    "nama_diagnosis",
    "judul",
    "nama",
    "sdki",
    "label"
  ]) || "Diagnosis terkait";
}

function getRelatedCode(row) {
  return pick(row, [
    "kodeSdki",
    "kode_sdki",
    "kodeDiagnosis",
    "kode_diagnosis",
    "idDiagnosis",
    "id_diagnosis",
    "kode",
    "id"
  ]);
}

function renderRelatedDiagnoses(items) {
  if (!items || !items.length) {
    return "";
  }

  return `
    <section>
      <div class="section-title">
        <i class="fa-solid fa-link"></i>
        <span>Kemungkinan Diagnosis Terkait</span>
      </div>

      ${items
        .map(row => {
          const title = getRelatedTitle(row);
          const code = getRelatedCode(row);

          const url = code
            ? `diagnosis-detail.html?id=${encodeURIComponent(
                code
              )}`
            : "#";

          return `
            <a
              href="${escapeHtml(url)}"
              class="related-card native-click"
            >
              <div class="related-icon">
                <i class="fa-solid fa-stethoscope"></i>
              </div>

              <div class="related-body">
                <div class="related-title">
                  ${escapeHtml(title)}
                </div>

                <div class="related-desc">
                  ${
                    code
                      ? `Kode: ${escapeHtml(code)}`
                      : "Diagnosis terkait"
                  }
                </div>
              </div>

              <i class="fa-solid fa-chevron-right chevron"></i>
            </a>
          `;
        })
        .join("")}
    </section>
  `;
}

function renderDetail(item, relatedDiagnoses) {
  const id = getItemId(item);
  const title =
    getItemTitle(item) || "Luaran SLKI";

  const description = getItemDesc(item);
  const category = getItemCategory(item);
  const subCategory = getItemSubCategory(item);
  const expectation = getEkspektasi(item);
  const indicators = getIndicators(item);
  const scale = getSkala(item);

  const purpose = pick(item, [
    "tujuan",
    "goal",
    "targetLuaran",
    "target_luaran"
  ]);

  document.title = `${title} - Detail SLKI`;
  headerSub.textContent =
    id || "Standar Luaran Keperawatan Indonesia";

  detailArea.innerHTML = `
    <section class="hero-card">
      <div class="badge">
        <i class="fa-solid fa-chart-line"></i>
        <span>SLKI</span>
      </div>

      <div class="hero-title">
        ${escapeHtml(title)}
      </div>

      ${
        expectation
          ? `
            <div class="hero-desc">
              Ekspektasi: ${escapeHtml(expectation)}
            </div>
          `
          : ""
      }
    </section>

    <section class="meta-grid">
      <div class="meta-card">
        <div class="meta-label">Kode</div>
        <div class="meta-value">
          ${escapeHtml(id || "-")}
        </div>
      </div>

      <div class="meta-card">
        <div class="meta-label">Jenis</div>
        <div class="meta-value">Luaran</div>
      </div>

      <div class="meta-card">
        <div class="meta-label">Kategori</div>
        <div class="meta-value">
          ${escapeHtml(category || "-")}
        </div>
      </div>

      <div class="meta-card">
        <div class="meta-label">Subkategori</div>
        <div class="meta-value">
          ${escapeHtml(subCategory || "-")}
        </div>
      </div>
    </section>

    ${renderTextSection(
      "Definisi",
      "fa-circle-info",
      description
    )}

    ${renderTextSection(
      "Tujuan",
      "fa-bullseye",
      purpose
    )}

    ${renderTextSection(
      "Ekspektasi",
      "fa-arrow-trend-up",
      expectation
    )}

    ${renderIndicators(indicators)}

    ${renderScale(scale)}

    ${renderRelatedDiagnoses(
      relatedDiagnoses
    )}
  `;
}

/* =========================
   LOAD DETAIL
========================= */
async function loadDetail() {
  loadingEl.style.display = "flex";
  detailArea.innerHTML = "";

  if (!detailId) {
    loadingEl.style.display = "none";

    renderEmpty(
      "ID luaran tidak ditemukan",
      "Halaman ini membutuhkan parameter id, misalnya slki-detail.html?id=L.01001."
    );

    return;
  }

  try {
    const [slkiJson, sdkiJson] =
      await Promise.all([
        fetchJsonSafe(API_ENDPOINTS.slki),
        fetchJsonSafe(API_ENDPOINTS.sdki)
      ]);

    const slkiList = toArray(slkiJson).filter(
      item =>
        item &&
        typeof item === "object" &&
        !Array.isArray(item)
    );

    const sdkiList = toArray(sdkiJson).filter(
      item =>
        item &&
        typeof item === "object" &&
        !Array.isArray(item)
    );

    const item = findSlkiItem(
      slkiList,
      detailId
    );

    if (!item) {
      renderEmpty(
        "Luaran tidak ditemukan",
        `Data SLKI dengan kode atau nama "${detailId}" tidak ditemukan.`
      );

      return;
    }

    const relatedDiagnoses =
      findRelatedDiagnoses(sdkiList, item);

    renderDetail(item, relatedDiagnoses);
  } catch (error) {
    console.error(
      "Gagal memuat detail SLKI:",
      error
    );

    renderEmpty(
      "Data SLKI gagal dimuat",
      error.message ||
        "Periksa endpoint API dan console browser."
    );
  } finally {
    loadingEl.style.display = "none";
  }
}

/* =========================
   RIPPLE EFFECT
========================= */
document.addEventListener("click", event => {
  const element = event.target.closest(
    ".native-click"
  );

  if (!element || element.disabled) {
    return;
  }

  const oldRipple =
    element.querySelector(".ripple");

  if (oldRipple) {
    oldRipple.remove();
  }

  const ripple =
    document.createElement("span");

  ripple.className = "ripple";

  const rect =
    element.getBoundingClientRect();

  const size = Math.max(
    rect.width,
    rect.height
  );

  ripple.style.width = `${size}px`;
  ripple.style.height = `${size}px`;

  ripple.style.left = `${
    event.clientX -
    rect.left -
    size / 2
  }px`;

  ripple.style.top = `${
    event.clientY -
    rect.top -
    size / 2
  }px`;

  element.appendChild(ripple);

  setTimeout(() => {
    ripple.remove();
  }, 600);
});

/* =========================
   BLOKIR SELECT
========================= */
document.addEventListener(
  "selectstart",
  event => {
    const allowed = event.target.closest(
      "input, textarea, select"
    );

    if (!allowed) {
      event.preventDefault();
    }
  }
);

/* =========================
   INIT
========================= */
loadDetail();
</script>
