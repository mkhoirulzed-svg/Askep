<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f0fdf4">
  <title>Detail SLKI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/responsive.css">
  <link rel="stylesheet" href="../styles/detail-standar.css">

  <style>
    :root{
      --primary:#16a34a;
      --primary-dark:#15803d;
      --primary-soft:#bbf7d0;
      --primary-light:#f0fdf4;
      --bg:#f7fee7;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --border:#dcfce7;
      --success:#16a34a;
      --warning:#f59e0b;
      --danger:#ef4444;
      --detail-shadow:rgba(22,163,74,.22);
      --ripple-color:rgba(22,163,74,.18);
    }

    .page-slki-detail .app{
      padding-bottom:calc(var(--bottom-nav-height) + env(safe-area-inset-bottom) + 20px);
    }

    .meta-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      margin:0 0 14px;
    }

    .meta-card{
      min-width:0;
      padding:13px;
      border:1px solid var(--border);
      border-radius:var(--radius-md);
      background:var(--card);
      box-shadow:var(--shadow-sm);
    }

    .meta-label{
      margin-bottom:5px;
      color:var(--muted);
      font-size:11px;
      font-weight:700;
    }

    .meta-value{
      overflow-wrap:anywhere;
      font-size:13px;
      font-weight:800;
      line-height:1.35;
    }

    .indicator-group{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .indicator-card{
      min-width:0;
      overflow:hidden;
      padding:14px;
      border:1px solid var(--border);
      border-radius:var(--radius-md);
      background:var(--card);
      box-shadow:var(--shadow-sm);
    }

    .indicator-head{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }

    .indicator-icon{
      display:flex;
      align-items:center;
      justify-content:center;
      width:38px;
      height:38px;
      flex:0 0 38px;
      border-radius:14px;
      background:#ecfdf5;
      color:var(--primary);
    }

    .indicator-title{
      min-width:0;
      font-size:14px;
      font-weight:800;
    }

    .indicator-list{
      margin:0;
      padding-left:18px;
    }

    .indicator-list li{
      margin:6px 0;
      overflow-wrap:anywhere;
      font-size:13px;
      line-height:1.6;
    }

    .scale-box{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:7px;
    }

    .scale-item{
      min-width:0;
      padding:10px 5px;
      border:1px solid var(--border);
      border-radius:14px;
      background:#f8fafc;
      text-align:center;
    }

    .scale-number{
      display:flex;
      align-items:center;
      justify-content:center;
      width:28px;
      height:28px;
      margin:0 auto 6px;
      border-radius:50%;
      background:#ecfdf5;
      color:var(--primary);
      font-size:13px;
      font-weight:800;
    }

    .scale-label{
      overflow-wrap:anywhere;
      color:var(--muted);
      font-size:10px;
      font-weight:700;
      line-height:1.25;
    }

    .related-card{
      position:relative;
      display:flex;
      align-items:flex-start;
      gap:12px;
      min-width:0;
      margin-bottom:10px;
      overflow:hidden;
      padding:14px;
      border:1px solid var(--border);
      border-radius:var(--radius-md);
      background:var(--card);
      box-shadow:var(--shadow-sm);
    }

    .related-icon{
      display:flex;
      align-items:center;
      justify-content:center;
      width:42px;
      height:42px;
      flex:0 0 42px;
      border-radius:15px;
      background:var(--primary-light);
      color:var(--primary);
    }

    .related-body{
      min-width:0;
      flex:1;
    }

    .related-title{
      overflow-wrap:anywhere;
      font-size:13px;
      font-weight:800;
      line-height:1.35;
    }

    .related-desc{
      margin-top:4px;
      color:var(--muted);
      font-size:11px;
    }

    .chevron{
      margin-top:12px;
      color:#94a3b8;
    }

    .empty-state{
      padding:42px 18px;
      color:var(--muted);
      text-align:center;
    }

    .empty-icon{
      display:flex;
      align-items:center;
      justify-content:center;
      width:70px;
      height:70px;
      margin:0 auto 14px;
      border-radius:24px;
      background:#ecfdf5;
      color:var(--primary);
      font-size:28px;
    }

    .empty-title{
      margin-bottom:6px;
      color:var(--text);
      font-size:15px;
      font-weight:800;
    }

    .empty-desc{
      font-size:12px;
      line-height:1.55;
    }

    .slki-detail-layout{
      display:block;
      min-width:0;
    }

    .detail-column{
      min-width:0;
    }

    @media (max-width:420px){
      .scale-box{
        gap:5px;
      }

      .scale-item{
        padding:9px 3px;
      }

      .scale-label{
        font-size:9px;
      }

    @media (min-width:900px){
      .page-slki-detail .app{
        padding-bottom:48px;
      }

      .slki-detail-layout{
        display:grid;
        grid-template-columns:minmax(0,.92fr) minmax(420px,1.08fr);
        align-items:start;
        gap:24px;
      }

      .detail-column{
        display:flex;
        flex-direction:column;
      }

      .detail-column > section:first-child .section-title{
        margin-top:0;
      }

      .meta-grid{
        margin-top:0;
      }
    }

    @media (min-width:1280px){
      .slki-detail-layout{
        gap:28px;
      }
    }

<script>
const API_BASE = "https://askep.mkhoirulzed.workers.dev";

const API_ENDPOINTS = {
  sdki: `${API_BASE}/api/sdki`,
  slki: `${API_BASE}/api/slki`,
  siki: `${API_BASE}/api/siki`,
  relations: `${API_BASE}/api/relations`
};

/* =========================
   ELEMENT
========================= */
const loadingEl = document.getElementById("loading");
const heroArea = document.getElementById("heroArea");
const detailArea = document.getElementById("detailArea");
const headerSub = document.getElementById("headerSub");

/* =========================
   PARAMETER URL
========================= */
const params = new URLSearchParams(window.location.search);

const detailId =
  params.get("id") ||
  params.get("kode") ||
  params.get("q") ||
  "";

/* =========================
   HELPERS
========================= */
function normalizeText(text) {
  return String(text || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^\w\s.-]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function pick(obj, keys) {
  for (const key of keys) {
    if (
      obj &&
      obj[key] !== undefined &&
      obj[key] !== null &&
      obj[key] !== ""
    ) {
      return obj[key];
    }
  }

  return "";
}

function toArray(data) {
  if (Array.isArray(data)) {
    return data;
  }

  if (!data || typeof data !== "object") {
    return [];
  }

  const candidates = [
    data.data,
    data.items,
    data.luaran,
    data.slki,
    data.outcomes,
    data.result,
    data.results
  ];

  for (const candidate of candidates) {
    if (Array.isArray(candidate)) {
      return candidate;
    }
  }

  const values = Object.values(data);

  if (
    values.length &&
    values.every(
      value =>
        value &&
        typeof value === "object" &&
        !Array.isArray(value)
    )
  ) {
    return values;
  }

  return [];
}

function stringifyDeep(value) {
  if (value === null || value === undefined) {
    return "";
  }

  if (
    typeof value === "string" ||
    typeof value === "number" ||
    typeof value === "boolean"
  ) {
    return String(value);
  }

  if (Array.isArray(value)) {
    return value.map(stringifyDeep).join(" ");
  }

  if (typeof value === "object") {
    return Object.values(value)
      .map(stringifyDeep)
      .join(" ");
  }

  return "";
}

function escapeHtml(text) {
  return String(text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function getItemId(item) {
  return pick(item, [
    "id",
    "kode",
    "kodeSlki",
    "kode_slki",
    "code",
    "nomor",
    "no"
  ]);
}

function getItemTitle(item) {
  return pick(item, [
    "judulSlki",
    "judul_slki",
    "namaLuaran",
    "nama_luaran",
    "title",
    "judul",
    "nama",
    "luaran",
    "outcome",
    "label",
    "name"
  ]);
}

function getItemDesc(item) {
  return pick(item, [
    "definisi",
    "deskripsi",
    "description",
    "keterangan"
  ]);
}

function getItemCategory(item) {
  return pick(item, [
    "kategori",
    "category",
    "kelompok",
    "domain"
  ]);
}

function getItemSubCategory(item) {
  return pick(item, [
    "subkategori",
    "subKategori",
    "sub_kategori",
    "sub_category",
    "subCategory",
    "kelas",
    "class"
  ]);
}

function getEkspektasi(item) {
  return pick(item, [
    "ekspektasi",
    "harapan",
    "expectation",
    "target",
    "arah"
  ]);
}

function arrayFromUnknown(value) {
  if (
    value === null ||
    value === undefined ||
    value === ""
  ) {
    return [];
  }

  if (Array.isArray(value)) {
    return value
      .map(item => {
        if (
          typeof item === "string" ||
          typeof item === "number"
        ) {
          return String(item);
        }

        if (item && typeof item === "object") {
          return pick(item, [
            "indikator",
            "nama",
            "judul",
            "label",
            "text",
            "kriteria"
          ]) || stringifyDeep(item);
        }

        return "";
      })
      .filter(Boolean);
  }

  if (typeof value === "string") {
    return value
      .split(/\n|;|\|/g)
      .map(item => item.trim())
      .filter(Boolean);
  }

  if (typeof value === "object") {
    return Object.values(value)
      .map(stringifyDeep)
      .filter(Boolean);
  }

  return [String(value)];
}

function getIndicators(item) {
  const direct = pick(item, [
    "indikator",
    "indikators",
    "indicators",
    "kriteria",
    "kriteriaHasil",
    "kriteria_hasil",
    "outcomeIndicator",
    "outcome_indicator"
  ]);

  const directArray = arrayFromUnknown(direct);

  if (directArray.length) {
    return directArray;
  }

  const nested =
    item.luaran ||
    item.detail ||
    item.data ||
    null;

  if (nested && typeof nested === "object") {
    const nestedValue = pick(nested, [
      "indikator",
      "indikators",
      "indicators",
      "kriteria",
      "kriteriaHasil",
      "kriteria_hasil"
    ]);

    return arrayFromUnknown(nestedValue);
  }

  return [];
}

function getSkala(item) {
  const scale = pick(item, [
    "skala",
    "skalaPenilaian",
    "skala_penilaian",
    "scale",
    "penilaian"
  ]);

  const scaleArray = arrayFromUnknown(scale);

  if (scaleArray.length) {
    return scaleArray;
  }

  return [
    "Menurun",
    "Cukup menurun",
    "Sedang",
    "Cukup meningkat",
    "Meningkat"
  ];
}

function findSlkiItem(list, id) {
  const target = normalizeText(id);

  if (!target) {
    return null;
  }

  const exact = list.find(item => {
    const itemId = normalizeText(getItemId(item));
    const title = normalizeText(getItemTitle(item));

    return itemId === target || title === target;
  });

  if (exact) {
    return exact;
  }

  return list.find(item => {
    const itemId = normalizeText(getItemId(item));
    const title = normalizeText(getItemTitle(item));

    return (
      itemId.includes(target) ||
      title.includes(target)
    );
  }) || null;
}

function findRelatedDiagnoses(sdkiList, slkiItem) {
  const slkiId = normalizeText(getItemId(slkiItem));
  const slkiTitle = normalizeText(
    getItemTitle(slkiItem)
  );

  if (!slkiId && !slkiTitle) {
    return [];
  }

  return sdkiList
    .filter(row => {
      const text = normalizeText(
        stringifyDeep(row)
      );

      return (
        (slkiId && text.includes(slkiId)) ||
        (slkiTitle && text.includes(slkiTitle))
      );
    })
    .slice(0, 8);
}

async function fetchJsonSafe(url) {
  const separator = url.includes("?") ? "&" : "?";

  const response = await fetch(
    `${url}${separator}v=${Date.now()}`,
    {
      method: "GET",
      headers: {
        Accept: "application/json"
      },
      cache: "no-store"
    }
  );

  const rawText = await response.text();

  if (!response.ok) {
    throw new Error(
      `HTTP ${response.status}: ${
        rawText || response.statusText
      }`
    );
  }

  if (!rawText.trim()) {
    throw new Error("Respons API kosong.");
  }

  let json;

  try {
    json = JSON.parse(rawText);
  } catch {
    throw new Error(
      "Respons API bukan JSON yang valid."
    );
  }

  if (
    json &&
    typeof json === "object" &&
    json.success === false
  ) {
    throw new Error(
      json.message ||
      "API mengembalikan status gagal."
    );
  }

  return json;
}

/* =========================
   RENDER
========================= */
function renderEmpty(title, description) {
  detailArea.innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">
        <i class="fa-solid fa-circle-exclamation"></i>
      </div>

      <div class="empty-title">
        ${escapeHtml(title)}
      </div>

      <div class="empty-desc">
        ${escapeHtml(description)}
      </div>
    </div>
  `;
}

function renderTextSection(title, icon, text) {
  if (!text) {
    return "";
  }

  return `
    <section>
      <div class="section-title">
        <i class="fa-solid ${icon}"></i>
        <span>${escapeHtml(title)}</span>
      </div>

      <div class="detail-card">
        <div class="detail-text">
          ${escapeHtml(text)}
        </div>
      </div>
    </section>
  `;
}

function renderIndicators(items) {
  if (!items || !items.length) {
    return "";
  }

  return `
    <section>
      <div class="section-title">
        <i class="fa-solid fa-list-check"></i>
        <span>Indikator Luaran</span>
      </div>

      <div class="indicator-group">
        <div class="indicator-card">
          <div class="indicator-head">
            <div class="indicator-icon">
              <i class="fa-solid fa-chart-line"></i>
            </div>

            <div class="indicator-title">
              Kriteria Hasil / Indikator
            </div>
          </div>

          <ol class="indicator-list">
            ${items
              .map(
                item =>
                  `<li>${escapeHtml(item)}</li>`
              )
              .join("")}
          </ol>
        </div>
      </div>
    </section>
  `;
}

function renderScale(items) {
  if (!items || !items.length) {
    return "";
  }

  const list = items.slice(0, 5);

  return `
    <section>
      <div class="section-title">
        <i class="fa-solid fa-sliders"></i>
        <span>Skala Penilaian</span>
      </div>

      <div class="detail-card">
        <div class="scale-box">
          ${list
            .map(
              (item, index) => `
                <div class="scale-item">
                  <div class="scale-number">
                    ${index + 1}
                  </div>

                  <div class="scale-label">
                    ${escapeHtml(item)}
                  </div>
                </div>
              `
            )
            .join("")}
        </div>
      </div>
    </section>
  `;
}

function getRelatedTitle(row) {
  return pick(row, [
    "judulSdki",
    "judul_sdki",
    "diagnosis",
    "diagnosa",
    "namaDiagnosis",
    "nama_diagnosis",
    "judul",
    "nama",
    "sdki",
    "label"
  ]) || "Diagnosis terkait";
}

function getRelatedCode(row) {
  return pick(row, [
    "kodeSdki",
    "kode_sdki",
    "kodeDiagnosis",
    "kode_diagnosis",
    "idDiagnosis",
    "id_diagnosis",
    "kode",
    "id"
  ]);
}

function renderRelatedDiagnoses(items) {
  if (!items || !items.length) {
    return "";
  }

  return `
    <section>
      <div class="section-title">
        <i class="fa-solid fa-link"></i>
        <span>Kemungkinan Diagnosis Terkait</span>
      </div>

      ${items
        .map(row => {
          const title = getRelatedTitle(row);
          const code = getRelatedCode(row);

          const url = code
            ? `diagnosis-detail.html?id=${encodeURIComponent(
                code
              )}`
            : "#";

          return `
            <a
              href="${escapeHtml(url)}"
              class="related-card native-click"
            >
              <div class="related-icon">
                <i class="fa-solid fa-stethoscope"></i>
              </div>

              <div class="related-body">
                <div class="related-title">
                  ${escapeHtml(title)}
                </div>

                <div class="related-desc">
                  ${
                    code
                      ? `Kode: ${escapeHtml(code)}`
                      : "Diagnosis terkait"
                  }
                </div>
              </div>

              <i class="fa-solid fa-chevron-right chevron"></i>
            </a>
          `;
        })
        .join("")}
    </section>
  `;
}

function renderDetail(item, relatedDiagnoses) {
  const id = getItemId(item);
  const title =
    getItemTitle(item) || "Luaran SLKI";

  const description = getItemDesc(item);
  const category = getItemCategory(item);
  const subCategory = getItemSubCategory(item);
  const expectation = getEkspektasi(item);
  const indicators = getIndicators(item);
  const scale = getSkala(item);

  const purpose = pick(item, [
    "tujuan",
    "goal",
    "targetLuaran",
    "target_luaran"
  ]);

  document.title = `${title} - Detail SLKI`;
  headerSub.textContent =
    id || "Standar Luaran Keperawatan Indonesia";

  heroArea.innerHTML = `
    <section class="hero-card">
      <div class="badge">
        <i class="fa-solid fa-chart-line"></i>
        <span>SLKI</span>
      </div>

      <div class="hero-title">
        ${escapeHtml(title)}
      </div>

      ${
        expectation
          ? `
            <div class="hero-desc">
              Ekspektasi: ${escapeHtml(expectation)}
            </div>
          `
          : ""
      }
    </section>
  `;

  detailArea.innerHTML = `
    <div class="slki-detail-layout">
      <div class="detail-column">
        <section class="meta-grid" aria-label="Informasi SLKI">
          <div class="meta-card">
            <div class="meta-label">Kode</div>
            <div class="meta-value">
              ${escapeHtml(id || "-")}
            </div>
          </div>

          <div class="meta-card">
            <div class="meta-label">Jenis</div>
            <div class="meta-value">Luaran</div>
          </div>

          <div class="meta-card">
            <div class="meta-label">Kategori</div>
            <div class="meta-value">
              ${escapeHtml(category || "-")}
            </div>
          </div>

          <div class="meta-card">
            <div class="meta-label">Subkategori</div>
            <div class="meta-value">
              ${escapeHtml(subCategory || "-")}
            </div>
          </div>
        </section>

        ${renderTextSection(
          "Definisi",
          "fa-circle-info",
          description
        )}

        ${renderTextSection(
          "Tujuan",
          "fa-bullseye",
          purpose
        )}

        ${renderTextSection(
          "Ekspektasi",
          "fa-arrow-trend-up",
          expectation
        )}
      </div>

      <div class="detail-column">
        ${renderIndicators(indicators)}
        ${renderScale(scale)}
        ${renderRelatedDiagnoses(relatedDiagnoses)}
      </div>
    </div>
  `;
}

/* =========================
   LOAD DETAIL
========================= */
async function loadDetail() {
  loadingEl.style.display = "flex";
  heroArea.innerHTML = "";
  detailArea.innerHTML = "";

  if (!detailId) {
    loadingEl.style.display = "none";

    renderEmpty(
      "ID luaran tidak ditemukan",
      "Halaman ini membutuhkan parameter id, misalnya slki-detail.html?id=L.01001."
    );

    return;
  }

  try {
    const [slkiJson, sdkiJson] =
      await Promise.all([
        fetchJsonSafe(API_ENDPOINTS.slki),
        fetchJsonSafe(API_ENDPOINTS.sdki)
      ]);

    const slkiList = toArray(slkiJson).filter(
      item =>
        item &&
        typeof item === "object" &&
        !Array.isArray(item)
    );

    const sdkiList = toArray(sdkiJson).filter(
      item =>
        item &&
        typeof item === "object" &&
        !Array.isArray(item)
    );

    const item = findSlkiItem(
      slkiList,
      detailId
    );

    if (!item) {
      renderEmpty(
        "Luaran tidak ditemukan",
        `Data SLKI dengan kode atau nama "${detailId}" tidak ditemukan.`
      );

      return;
    }

    const relatedDiagnoses =
      findRelatedDiagnoses(sdkiList, item);

    renderDetail(item, relatedDiagnoses);
  } catch (error) {
    console.error(
      "Gagal memuat detail SLKI:",
      error
    );

    renderEmpty(
      "Data SLKI gagal dimuat",
      error.message ||
        "Periksa endpoint API dan console browser."
    );
  } finally {
    loadingEl.style.display = "none";
  }
}

/* =========================
   RIPPLE EFFECT
========================= */
document.addEventListener("click", event => {
  const element = event.target.closest(
    ".native-click"
  );

  if (!element || element.disabled) {
    return;
  }

  const oldRipple =
    element.querySelector(".ripple");

  if (oldRipple) {
    oldRipple.remove();
  }

  const ripple =
    document.createElement("span");

  ripple.className = "ripple";

  const rect =
    element.getBoundingClientRect();

  const size = Math.max(
    rect.width,
    rect.height
  );

  ripple.style.width = `${size}px`;
  ripple.style.height = `${size}px`;

  ripple.style.left = `${
    event.clientX -
    rect.left -
    size / 2
  }px`;

  ripple.style.top = `${
    event.clientY -
    rect.top -
    size / 2
  }px`;

  element.appendChild(ripple);

  setTimeout(() => {
    ripple.remove();
  }, 600);
});

/* =========================
   BLOKIR SELECT
========================= */
document.addEventListener(
  "selectstart",
  event => {
    const allowed = event.target.closest(
      "input, textarea, select"
    );

    if (!allowed) {
      event.preventDefault();
    }
  }
);

/* =========================
   INIT
========================= */
loadDetail();
</script>
