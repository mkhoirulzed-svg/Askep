<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#eff6ff">
  <title>Detail Diagnosis</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="../src/global.css">

  <link rel="stylesheet" href="../src/components.css">

<body class="page-diagnosis-detail">
  <div class="app">
    <header class="detail-header">
      <div class="detail-topbar">
        <button class="nav-btn native-click" type="button" onclick="history.back()" aria-label="Kembali">
          <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
        </button>

        <div class="detail-heading">
          <h1>Detail Diagnosis</h1>
          <p>SDKI → SLKI → SIKI</p>
        </div>

        <button id="favBtn" class="nav-btn native-click" type="button" aria-label="Simpan ke favorit">
          <i class="fa-regular fa-bookmark" aria-hidden="true"></i>
        </button>
      </div>

      <div id="heroArea" aria-live="polite"></div>
    </header>

    <main id="contentArea" class="detail-content" aria-live="polite">
      <div class="loading">
        <div class="spinner" aria-hidden="true"></div>
        <span>Memuat diagnosis...</span>
      </div>
    </main>
  </div>

  <nav class="bottom-nav" aria-label="Navigasi utama">
    <a href="../index.html" class="bottom-item native-click">
      <i class="fa-solid fa-house" aria-hidden="true"></i>
      <span>Home</span>
    </a>
    <a href="search.html" class="bottom-item native-click">
      <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
      <span>Cari</span>
    </a>
    <a href="quick-askep.html" class="bottom-item native-click">
      <i class="fa-solid fa-notes-medical" aria-hidden="true"></i>
      <span>Askep</span>
    </a>
    <a href="profil.html" class="bottom-item native-click">
      <i class="fa-solid fa-user-nurse" aria-hidden="true"></i>
      <span>Profil</span>
    </a>
  </nav>

  <script src="../scripts/diagnosis-detail.js" defer></script>

</html>
