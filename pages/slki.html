<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Daftar SLKI</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="../styles/global.css">
<link rel="stylesheet" href="../styles/layout.css">
<link rel="stylesheet" href="../styles/components.css">
<link rel="stylesheet" href="../styles/responsive.css">
<link rel="stylesheet" href="../styles/daftar-standar.css">
</head>

<body class="page-daftar-standar theme-slki">

<div class="app">

  <header class="header">
    <div class="topbar">
      <button class="nav-btn native-click" onclick="history.back()" aria-label="Kembali">
        <i class="fa-solid fa-arrow-left"></i>
      </button>

      <div class="header-title">
        <h1>Daftar SLKI</h1>
        <p id="headerSub">Standar Luaran Keperawatan Indonesia</p>
      </div>

      <a href="../index.html" class="nav-btn native-click" aria-label="Home">
        <i class="fa-solid fa-house"></i>
      </a>
    </div>
  </header>

  <main class="content">
    <section class="hero-card">
      <div class="badge">
        <i class="fa-solid fa-chart-line"></i>
        <span>SLKI</span>
      </div>
      <div class="hero-title">Luaran Keperawatan</div>
    </section>

    <section class="search-card">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="searchInput" type="search" placeholder="Cari luaran, kode, kategori..." autocomplete="off" />
        <button id="clearSearch" class="clear-btn native-click" type="button" aria-label="Hapus pencarian">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <div class="info-row">
        <div id="resultCount" class="result-count">Memuat data...</div>
        <div id="pageCount" class="page-count">Halaman 1</div>
      </div>
    </section>

    <section id="categoryTags" class="category-scroll"></section>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <span>Memuat daftar luaran...</span>
    </div>

    <section id="listArea" class="outcome-list"></section>

    <section id="pagination" class="pagination" style="display:none;">
      <button id="prevBtn" class="page-btn native-click" type="button">
        <i class="fa-solid fa-chevron-left"></i>
        <span>Sebelumnya</span>
      </button>

      <div id="pageNumber" class="page-number">1 / 1</div>

      <button id="nextBtn" class="page-btn native-click" type="button">
        <span>Berikutnya</span>
        <i class="fa-solid fa-chevron-right"></i>
      </button>
    </section>
  </main>

</div>

<nav class="bottom-nav">
  <a href="../index.html" class="bottom-item native-click">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>

  <a href="search.html" class="bottom-item active native-click">
    <i class="fa-solid fa-magnifying-glass"></i>
    <span>Cari</span>
  </a>

  <a href="quick-askep.html" class="bottom-item native-click">
    <i class="fa-solid fa-notes-medical"></i>
    <span>Askep</span>
  </a>

  <a href="profil.html" class="bottom-item native-click">
    <i class="fa-solid fa-user-nurse"></i>
    <span>Profil</span>
  </a>
</nav>

<script src="../scripts/slki.js" defer></script>
  
</body>
</html>
