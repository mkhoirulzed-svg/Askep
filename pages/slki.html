<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Daftar SLKI</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --primary:#16a34a;
  --primary-dark:#15803d;
  --primary-soft:#bbf7d0;
  --primary-light:#f0fdf4;

  --bg:#f7fee7;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#dcfce7;

  --success:#16a34a;
  --warning:#f59e0b;
  --danger:#ef4444;

  --radius-sm:12px;
  --radius-md:18px;
  --radius-lg:24px;

  --shadow-sm:0 4px 14px rgba(20,83,45,.07);
  --shadow-md:0 10px 28px rgba(20,83,45,.10);

  --bottom-nav-height:76px;
}
  
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  font-family:"Plus Jakarta Sans",system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overscroll-behavior:none;
}

body,
button,
a,
.card,
.outcome-card,
.bottom-item,
.native-click{
  user-select:none;
  -webkit-user-select:none;
  -ms-user-select:none;
}

input,
textarea,
select{
  user-select:text;
  -webkit-user-select:text;
}

a{
  color:inherit;
  text-decoration:none;
}

button{
  font:inherit;
  cursor:pointer;
}

.app{
  max-width:520px;
  margin:0 auto;
  min-height:100vh;
  background:linear-gradient(180deg,var(--primary-light) 0%,var(--bg) 280px);
  padding-bottom:calc(var(--bottom-nav-height) + env(safe-area-inset-bottom) + 20px);
}

.header{
  padding:18px 18px 14px;
}

.topbar{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}

.nav-btn{
  width:44px;
  height:44px;
  border:0;
  border-radius:15px;
  background:var(--card);
  color:var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:var(--shadow-sm);
  position:relative;
  overflow:hidden;
}

.header-title{
  flex:1;
  min-width:0;
}

.header-title h1{
  font-size:19px;
  font-weight:800;
  margin:0;
  line-height:1.2;
}

.header-title p{
  font-size:12px;
  color:var(--muted);
  margin:4px 0 0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.content{
  padding:0 18px;
}

.hero-card{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;
  border-radius:var(--radius-lg);
  padding:18px;
  box-shadow:0 16px 32px rgba(22,163,74,.22);
  margin-bottom:14px;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  border-radius:999px;
  padding:6px 10px;
  font-size:11px;
  font-weight:800;
  background:rgba(255,255,255,.16);
  color:#fff;
  margin-bottom:10px;
}

.hero-title{
  font-size:21px;
  font-weight:800;
  line-height:1.25;
  margin-bottom:8px;
}

.hero-desc{
  font-size:13px;
  line-height:1.55;
  opacity:.94;
}

.search-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:13px;
  box-shadow:var(--shadow-sm);
  margin-bottom:14px;
}

.search-box{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--primary-light);
  border:1px solid var(--primary-soft);
  border-radius:18px;
  padding:0 13px;
  min-height:48px;
}

.search-box i{
  color:var(--primary);
  font-size:15px;
}

.search-box input{
  flex:1;
  min-width:0;
  border:0;
  outline:0;
  background:transparent;
  color:var(--text);
  font-size:14px;
  font-weight:600;
  height:46px;
}

.search-box input::placeholder{
  color:#94a3b8;
  font-weight:600;
}

.clear-btn{
  width:30px;
  height:30px;
  border:0;
  border-radius:999px;
  background:#fff;
  color:var(--muted);
  display:none;
  align-items:center;
  justify-content:center;
  box-shadow:0 2px 8px rgba(15,23,42,.08);
}

.info-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin:12px 2px 4px;
}

.result-count{
  font-size:12px;
  color:var(--muted);
  font-weight:700;
}

.page-count{
  font-size:12px;
  color:var(--primary);
  font-weight:800;
}

.category-scroll{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:2px 2px 12px;
  margin-bottom:4px;
  scrollbar-width:none;
}

.category-scroll::-webkit-scrollbar{
  display:none;
}

.category-chip{
  flex:0 0 auto;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--muted);
  border-radius:999px;
  padding:9px 13px;
  font-size:12px;
  font-weight:800;
  box-shadow:var(--shadow-sm);
  position:relative;
  overflow:hidden;
  white-space:nowrap;
}

.category-chip.active{
  background:var(--primary);
  color:#fff;
  border-color:var(--primary);
  box-shadow:0 10px 22px rgba(22,163,74,.22);
}

.outcome-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.outcome-card{
  display:flex;
  align-items:flex-start;
  gap:12px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  padding:14px;
  box-shadow:var(--shadow-sm);
  position:relative;
  overflow:hidden;
}

.outcome-icon{
  width:44px;
  height:44px;
  border-radius:16px;
  background:var(--primary-light);
  color:var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.outcome-body{
  flex:1;
  min-width:0;
}

.outcome-top{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:5px;
}

.outcome-code{
  display:inline-flex;
  align-items:center;
  border-radius:999px;
  padding:4px 8px;
  background:var(--primary-light);
  color:var(--primary-dark);
  font-size:10px;
  font-weight:800;
  line-height:1;
}

.outcome-category{
  font-size:10px;
  color:var(--muted);
  font-weight:800;
}

.outcome-title{
  font-size:14px;
  font-weight:800;
  line-height:1.35;
  margin-bottom:5px;
}

.outcome-desc{
  font-size:12px;
  color:var(--muted);
  line-height:1.55;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.chevron{
  color:#94a3b8;
  margin-top:14px;
}

.pagination{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin:16px 0 4px;
}

.page-btn{
  flex:1;
  min-height:44px;
  border:0;
  border-radius:16px;
  background:var(--card);
  color:var(--primary);
  font-size:13px;
  font-weight:800;
  box-shadow:var(--shadow-sm);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  position:relative;
  overflow:hidden;
}

.page-btn:disabled{
  opacity:.45;
  color:var(--muted);
  cursor:not-allowed;
}

.page-number{
  min-width:78px;
  min-height:44px;
  border-radius:16px;
  background:var(--primary);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:800;
  box-shadow:0 10px 20px rgba(37,99,235,.20);
}

.empty-state{
  text-align:center;
  padding:42px 18px;
  color:var(--muted);
}

.empty-icon{
  width:70px;
  height:70px;
  border-radius:24px;
  background:var(--primary-light);
  color:var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 14px;
  font-size:28px;
}

.empty-title{
  font-size:15px;
  font-weight:800;
  color:var(--text);
  margin-bottom:6px;
}

.empty-desc{
  font-size:12px;
  line-height:1.55;
}

.loading{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  color:var(--muted);
  font-size:13px;
  padding:40px 0;
}

.spinner{
  width:18px;
  height:18px;
  border:3px solid var(--primary-soft);
  border-top-color:var(--primary);
  border-radius:50%;
  animation:spin .8s linear infinite;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

.native-click{
  position:relative;
  overflow:hidden;
  cursor:pointer;
  touch-action:manipulation;
}

.native-click:active{
  transform:scale(.985);
}

.ripple{
  position:absolute;
  border-radius:50%;
  transform:scale(0);
  animation:ripple .55s linear;
  background:rgba(37,99,235,.18);
  pointer-events:none;
}

@keyframes ripple{
  to{
    transform:scale(4);
    opacity:0;
  }
}

.bottom-nav{
  position:fixed;
  left:50%;
  bottom:0;
  transform:translateX(-50%);
  width:100%;
  max-width:520px;
  height:calc(var(--bottom-nav-height) + env(safe-area-inset-bottom));
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-top:1px solid var(--border);
  display:grid;
  grid-template-columns:repeat(4,1fr);
  padding:8px 8px calc(8px + env(safe-area-inset-bottom));
  z-index:50;
}

.bottom-item{
  border:0;
  background:transparent;
  color:var(--muted);
  border-radius:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  font-size:11px;
  font-weight:700;
  position:relative;
  overflow:hidden;
}

.bottom-item i{
  font-size:18px;
}

.bottom-item.active{
  color:var(--primary);
  background:var(--primary-light);
}
</style>
</head>

<body>

<div class="app">

  <header class="header">
    <div class="topbar">
      <button class="nav-btn native-click" onclick="history.back()" aria-label="Kembali">
        <i class="fa-solid fa-arrow-left"></i>
      </button>

      <div class="header-title">
        <h1>Daftar SLKI</h1>
        <p id="headerSub">Standar Luaran Keperawatan Indonesia</p>
      </div>

      <a href="../index.html" class="nav-btn native-click" aria-label="Home">
        <i class="fa-solid fa-house"></i>
      </a>
    </div>
  </header>

  <main class="content">
    <section class="hero-card">
      <div class="badge">
        <i class="fa-solid fa-chart-line"></i>
        <span>SLKI</span>
      </div>
      <div class="hero-title">Luaran Keperawatan</div>
    </section>

    <section class="search-card">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="searchInput" type="search" placeholder="Cari luaran, kode, kategori..." autocomplete="off" />
        <button id="clearSearch" class="clear-btn native-click" type="button" aria-label="Hapus pencarian">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <div class="info-row">
        <div id="resultCount" class="result-count">Memuat data...</div>
        <div id="pageCount" class="page-count">Halaman 1</div>
      </div>
    </section>

    <section id="categoryTags" class="category-scroll"></section>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <span>Memuat daftar luaran...</span>
    </div>

    <section id="listArea" class="outcome-list"></section>

    <section id="pagination" class="pagination" style="display:none;">
      <button id="prevBtn" class="page-btn native-click" type="button">
        <i class="fa-solid fa-chevron-left"></i>
        <span>Sebelumnya</span>
      </button>

      <div id="pageNumber" class="page-number">1 / 1</div>

      <button id="nextBtn" class="page-btn native-click" type="button">
        <span>Berikutnya</span>
        <i class="fa-solid fa-chevron-right"></i>
      </button>
    </section>
  </main>

</div>

<nav class="bottom-nav">
  <a href="../index.html" class="bottom-item native-click">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>

  <a href="search.html" class="bottom-item native-click">
    <i class="fa-solid fa-magnifying-glass"></i>
    <span>Cari</span>
  </a>

  <a href="quick-askep.html" class="bottom-item native-click">
    <i class="fa-solid fa-notes-medical"></i>
    <span>Askep</span>
  </a>

  <a href="profil.html" class="bottom-item native-click">
    <i class="fa-solid fa-user-nurse"></i>
    <span>Profil</span>
  </a>
</nav>

<script>
/* =========================
   KONFIGURASI API
========================= */
const API_BASE = "https://askep.mkhoirulzed.workers.dev";

const API_ENDPOINTS = {
  sdki: `${API_BASE}/api/sdki`,
  slki: `${API_BASE}/api/slki`,
  siki: `${API_BASE}/api/siki`,
  relations: `${API_BASE}/api/relations`
};

const PER_PAGE = 20;

/* =========================
   ELEMENT
========================= */
const loadingEl = document.getElementById("loading");
const listArea = document.getElementById("listArea");
const paginationEl = document.getElementById("pagination");
const searchInput = document.getElementById("searchInput");
const clearSearch = document.getElementById("clearSearch");
const resultCount = document.getElementById("resultCount");
const pageCount = document.getElementById("pageCount");
const pageNumber = document.getElementById("pageNumber");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const headerSub = document.getElementById("headerSub");
const categoryTags = document.getElementById("categoryTags");

/* =========================
   STATE
========================= */
let allOutcomes = [];
let filteredOutcomes = [];
let currentPage = 1;
let activeCategory = "Semua";

/* =========================
   HELPER
========================= */
function normalizeText(text) {
  return String(text || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^\w\s.-]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function pick(obj, keys) {
  for (const key of keys) {
    if (
      obj &&
      obj[key] !== undefined &&
      obj[key] !== null &&
      obj[key] !== ""
    ) {
      return obj[key];
    }
  }

  return "";
}

function toArray(data) {
  if (Array.isArray(data)) {
    return data;
  }

  if (!data || typeof data !== "object") {
    return [];
  }

  const possibleArrays = [
    data.data,
    data.items,
    data.luaran,
    data.outcomes,
    data.slki,
    data.result,
    data.results
  ];

  for (const value of possibleArrays) {
    if (Array.isArray(value)) {
      return value;
    }
  }

  /*
   * Jangan langsung memakai Object.values(data) jika respons API
   * memiliki properti seperti success, message, dan data.
   */
  const values = Object.values(data);

  if (
    values.length &&
    values.every(
      value =>
        value &&
        typeof value === "object" &&
        !Array.isArray(value)
    )
  ) {
    return values;
  }

  return [];
}

function escapeHtml(text) {
  return String(text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function stringifyDeep(value) {
  if (value === null || value === undefined) {
    return "";
  }

  if (
    typeof value === "string" ||
    typeof value === "number" ||
    typeof value === "boolean"
  ) {
    return String(value);
  }

  if (Array.isArray(value)) {
    return value.map(stringifyDeep).join(" ");
  }

  if (typeof value === "object") {
    return Object.values(value)
      .map(stringifyDeep)
      .join(" ");
  }

  return "";
}

function getOutcomeId(item) {
  return pick(item, [
    "id",
    "slug",
    "kode",
    "kodeSlki",
    "code",
    "nomor",
    "no"
  ]);
}

function getOutcomeCode(item) {
  return pick(item, [
    "kode",
    "kodeSlki",
    "code",
    "nomor",
    "no"
  ]);
}

function getOutcomeTitle(item) {
  return pick(item, [
    "nama",
    "namaLuaran",
    "judulSlki",
    "luaran",
    "outcome",
    "judul",
    "title",
    "label",
    "name"
  ]);
}

function getOutcomeDesc(item) {
  return pick(item, [
    "definisi",
    "deskripsi",
    "description",
    "keterangan",
    "ekspektasi"
  ]);
}

function getOutcomeCategory(item) {
  return pick(item, [
    "kategori",
    "category",
    "domain",
    "kelompok"
  ]);
}

function getOutcomeSubCategory(item) {
  return pick(item, [
    "subkategori",
    "subKategori",
    "sub_category",
    "subCategory",
    "kelas",
    "class"
  ]);
}

function getOutcomeExpectation(item) {
  return pick(item, [
    "ekspektasi",
    "harapan",
    "expectation",
    "target"
  ]);
}

function makeSearchText(item) {
  return normalizeText(
    [
      getOutcomeId(item),
      getOutcomeCode(item),
      getOutcomeTitle(item),
      getOutcomeDesc(item),
      getOutcomeCategory(item),
      getOutcomeSubCategory(item),
      getOutcomeExpectation(item),
      stringifyDeep(item)
    ].join(" ")
  );
}

function makeDetailUrl(item) {
  const id =
    getOutcomeId(item) ||
    getOutcomeCode(item) ||
    getOutcomeTitle(item);

  return `slki-detail.html?id=${encodeURIComponent(id)}`;
}

async function fetchJsonSafe(url) {
  try {
    const separator = url.includes("?") ? "&" : "?";

    const response = await fetch(
      `${url}${separator}v=${Date.now()}`,
      {
        method: "GET",
        headers: {
          Accept: "application/json"
        },
        cache: "no-store"
      }
    );

    const rawText = await response.text();

    if (!response.ok) {
      throw new Error(
        `HTTP ${response.status}: ${rawText || response.statusText}`
      );
    }

    if (!rawText.trim()) {
      throw new Error("Respons API kosong.");
    }

    let json;

    try {
      json = JSON.parse(rawText);
    } catch {
      throw new Error("Respons API bukan JSON yang valid.");
    }

    if (
      json &&
      typeof json === "object" &&
      json.success === false
    ) {
      throw new Error(
        json.message || "API mengembalikan status gagal."
      );
    }

    return json;
  } catch (error) {
    console.error("Gagal mengambil data SLKI:", error);
    throw error;
  }
}

/* =========================
   RENDER
========================= */
function renderEmpty(title, description) {
  listArea.innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">
        <i class="fa-solid fa-circle-exclamation"></i>
      </div>

      <div class="empty-title">
        ${escapeHtml(title)}
      </div>

      <div class="empty-desc">
        ${escapeHtml(description)}
      </div>
    </div>
  `;
}

function getUniqueCategories() {
  const categories = allOutcomes
    .map(item => getOutcomeCategory(item))
    .filter(Boolean)
    .map(category => String(category).trim())
    .filter(Boolean);

  return [
    "Semua",
    ...Array.from(new Set(categories)).sort((a, b) =>
      a.localeCompare(b, "id")
    )
  ];
}

function renderCategoryTags() {
  const categories = getUniqueCategories();

  categoryTags.innerHTML = categories
    .map(category => {
      const isActive = category === activeCategory;

      return `
        <button
          type="button"
          class="category-chip native-click ${
            isActive ? "active" : ""
          }"
          data-category="${escapeHtml(category)}"
        >
          ${escapeHtml(category)}
        </button>
      `;
    })
    .join("");
}

function renderList() {
  const totalItems = filteredOutcomes.length;
  const totalPages = Math.max(
    1,
    Math.ceil(totalItems / PER_PAGE)
  );

  if (currentPage > totalPages) {
    currentPage = totalPages;
  }

  if (currentPage < 1) {
    currentPage = 1;
  }

  const startIndex = (currentPage - 1) * PER_PAGE;
  const pageItems = filteredOutcomes.slice(
    startIndex,
    startIndex + PER_PAGE
  );

  resultCount.textContent = totalItems
    ? `${totalItems} luaran ditemukan`
    : "Tidak ada luaran";

  pageCount.textContent = `Halaman ${currentPage}`;
  pageNumber.textContent = `${currentPage} / ${totalPages}`;

  prevBtn.disabled = currentPage <= 1;
  nextBtn.disabled = currentPage >= totalPages;

  paginationEl.style.display =
    totalItems > PER_PAGE ? "flex" : "none";

  if (!totalItems) {
    renderEmpty(
      "Luaran tidak ditemukan",
      "Coba gunakan kata kunci lain seperti nyeri, mobilitas, perfusi, kode SLKI, atau kategori."
    );

    return;
  }

  listArea.innerHTML = pageItems
    .map(item => {
      const id = getOutcomeId(item);
      const code = getOutcomeCode(item);
      const title =
        getOutcomeTitle(item) || "Luaran SLKI";

      const description =
        getOutcomeDesc(item) ||
        getOutcomeExpectation(item) ||
        "Ketuk untuk melihat detail luaran.";

      const category = getOutcomeCategory(item);
      const subCategory = getOutcomeSubCategory(item);
      const expectation = getOutcomeExpectation(item);
      const url = makeDetailUrl(item);

      const categoryText =
        [category, subCategory]
          .filter(Boolean)
          .join(" • ") || "SLKI";

      const descriptionText = [
        expectation
          ? `Ekspektasi: ${expectation}`
          : "",
        description
      ]
        .filter(Boolean)
        .join(" — ");

      return `
        <a
          href="${escapeHtml(url)}"
          class="outcome-card native-click"
        >
          <div class="outcome-icon">
            <i class="fa-solid fa-chart-simple"></i>
          </div>

          <div class="outcome-body">
            <div class="outcome-top">
              <span class="outcome-code">
                ${escapeHtml(code || id || "-")}
              </span>

              <span class="outcome-category">
                ${escapeHtml(categoryText)}
              </span>
            </div>

            <div class="outcome-title">
              ${escapeHtml(title)}
            </div>

            <div class="outcome-desc">
              ${escapeHtml(descriptionText)}
            </div>
          </div>

          <i class="fa-solid fa-chevron-right chevron"></i>
        </a>
      `;
    })
    .join("");
}

function applySearch() {
  const query = normalizeText(searchInput.value);

  clearSearch.style.display = query ? "flex" : "none";

  const categoryFiltered =
    activeCategory === "Semua"
      ? [...allOutcomes]
      : allOutcomes.filter(item => {
          return (
            normalizeText(getOutcomeCategory(item)) ===
            normalizeText(activeCategory)
          );
        });

  if (!query) {
    filteredOutcomes = categoryFiltered;
    currentPage = 1;
    renderList();
    return;
  }

  const keywords = query
    .split(/\s+/)
    .filter(Boolean);

  filteredOutcomes = categoryFiltered
    .map(item => {
      const searchText = makeSearchText(item);
      const title = normalizeText(
        getOutcomeTitle(item)
      );
      const code = normalizeText(
        getOutcomeCode(item)
      );

      let score = 0;

      for (const keyword of keywords) {
        if (code === keyword) {
          score += 50;
        }

        if (code.includes(keyword)) {
          score += 30;
        }

        if (title.includes(keyword)) {
          score += 25;
        }

        if (searchText.includes(keyword)) {
          score += 10;
        }
      }

      const matched = keywords.every(keyword =>
        searchText.includes(keyword)
      );

      return {
        item,
        score,
        matched
      };
    })
    .filter(row => row.matched)
    .sort((a, b) => b.score - a.score)
    .map(row => row.item);

  currentPage = 1;
  renderList();
}

/* =========================
   LOAD DATA SLKI
========================= */
async function loadSlki() {
  loadingEl.style.display = "flex";
  listArea.innerHTML = "";
  paginationEl.style.display = "none";

  try {
    const slkiJson = await fetchJsonSafe(
      API_ENDPOINTS.slki
    );

    allOutcomes = toArray(slkiJson).filter(
      item =>
        item &&
        typeof item === "object" &&
        !Array.isArray(item)
    );

    filteredOutcomes = [...allOutcomes];

    renderCategoryTags();

    headerSub.textContent = allOutcomes.length
      ? `${allOutcomes.length} luaran tersedia`
      : "Standar Luaran Keperawatan Indonesia";

    if (!allOutcomes.length) {
      resultCount.textContent = "Data kosong";
      pageCount.textContent = "Halaman 1";

      renderEmpty(
        "Data SLKI kosong",
        "Endpoint API berhasil dibuka, tetapi tidak menemukan daftar data SLKI."
      );

      return;
    }

    renderList();
  } catch (error) {
    console.error(error);

    resultCount.textContent = "Gagal memuat data";
    pageCount.textContent = "Halaman 1";
    headerSub.textContent =
      "Standar Luaran Keperawatan Indonesia";

    renderEmpty(
      "Data SLKI gagal dimuat",
      error.message ||
        "Periksa endpoint API SLKI dan console browser."
    );
  } finally {
    loadingEl.style.display = "none";
  }
}

/* =========================
   EVENT
========================= */
searchInput.addEventListener("input", applySearch);

clearSearch.addEventListener("click", () => {
  searchInput.value = "";
  searchInput.focus();
  applySearch();
});

prevBtn.addEventListener("click", () => {
  if (currentPage <= 1) {
    return;
  }

  currentPage -= 1;
  renderList();

  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
});

nextBtn.addEventListener("click", () => {
  const totalPages = Math.max(
    1,
    Math.ceil(filteredOutcomes.length / PER_PAGE)
  );

  if (currentPage >= totalPages) {
    return;
  }

  currentPage += 1;
  renderList();

  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
});

categoryTags.addEventListener("click", event => {
  const button = event.target.closest(
    ".category-chip"
  );

  if (!button) {
    return;
  }

  activeCategory =
    button.dataset.category || "Semua";

  categoryTags
    .querySelectorAll(".category-chip")
    .forEach(chip => {
      chip.classList.toggle(
        "active",
        chip.dataset.category === activeCategory
      );
    });

  currentPage = 1;
  applySearch();
});

/* =========================
   RIPPLE EFFECT
========================= */
document.addEventListener("click", event => {
  const element = event.target.closest(
    ".native-click"
  );

  if (!element || element.disabled) {
    return;
  }

  const oldRipple =
    element.querySelector(".ripple");

  if (oldRipple) {
    oldRipple.remove();
  }

  const ripple =
    document.createElement("span");

  ripple.className = "ripple";

  const rect =
    element.getBoundingClientRect();

  const size = Math.max(
    rect.width,
    rect.height
  );

  ripple.style.width = `${size}px`;
  ripple.style.height = `${size}px`;

  ripple.style.left = `${
    event.clientX -
    rect.left -
    size / 2
  }px`;

  ripple.style.top = `${
    event.clientY -
    rect.top -
    size / 2
  }px`;

  element.appendChild(ripple);

  setTimeout(() => {
    ripple.remove();
  }, 600);
});

/* =========================
   BLOKIR SELECT
========================= */
document.addEventListener(
  "selectstart",
  event => {
    const allowed = event.target.closest(
      "input, textarea, select"
    );

    if (!allowed) {
      event.preventDefault();
    }
  }
);

/* =========================
   INIT
========================= */
loadSlki();
</script>
  
</body>
</html>
