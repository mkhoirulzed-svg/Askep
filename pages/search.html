<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Pencarian SDKI SLKI SIKI</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --primary:#2563eb;
  --primary-dark:#1d4ed8;
  --primary-soft:#dbeafe;
  --primary-light:#eff6ff;

  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;

  --success:#16a34a;
  --warning:#f59e0b;
  --danger:#ef4444;

  --radius-sm:12px;
  --radius-md:18px;
  --radius-lg:24px;

  --shadow-sm:0 4px 14px rgba(15,23,42,.07);
  --shadow-md:0 10px 28px rgba(15,23,42,.10);

  --bottom-nav-height:76px;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  font-family:"Plus Jakarta Sans",system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overscroll-behavior:none;
}

body,
button,
a,
.card,
.result-card,
.tab-btn,
.bottom-item,
.native-click{
  user-select:none;
  -webkit-user-select:none;
  -ms-user-select:none;
}

input,
textarea,
select{
  user-select:text;
  -webkit-user-select:text;
}

a{
  color:inherit;
  text-decoration:none;
}

button{
  font:inherit;
  cursor:pointer;
}

.app{
  max-width:520px;
  margin:0 auto;
  min-height:100vh;
  background:linear-gradient(180deg,var(--primary-light) 0%,var(--bg) 280px);
  padding-bottom:calc(var(--bottom-nav-height) + env(safe-area-inset-bottom) + 20px);
}

.header{
  padding:18px 18px 14px;
}

.topbar{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}

.nav-btn{
  width:44px;
  height:44px;
  border:0;
  border-radius:15px;
  background:var(--card);
  color:var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:var(--shadow-sm);
  position:relative;
  overflow:hidden;
}

.header-title{
  flex:1;
}

.header-title h1{
  font-size:19px;
  font-weight:800;
  margin:0;
  line-height:1.2;
}

.header-title p{
  font-size:12px;
  color:var(--muted);
  margin:4px 0 0;
}

.search-box{
  display:flex;
  align-items:center;
  gap:12px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:14px 16px;
  box-shadow:var(--shadow-md);
}

.search-box i{
  color:var(--primary);
}

.search-box input{
  flex:1;
  border:0;
  outline:0;
  font-size:14px;
  background:transparent;
  color:var(--text);
}

.search-box input::placeholder{
  color:#94a3b8;
}

.clear-btn{
  border:0;
  background:var(--primary-light);
  color:var(--primary);
  width:30px;
  height:30px;
  border-radius:50%;
  display:none;
  align-items:center;
  justify-content:center;
}

.content{
  padding:14px 18px 0;
}

.info-card{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;
  border-radius:var(--radius-lg);
  padding:16px;
  box-shadow:0 16px 32px rgba(37,99,235,.22);

}

.info-title{
  font-size:15px;

}

.info-desc{
  font-size:12px;

}

.tabs{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding-bottom:4px;
  margin-bottom:14px;
  scrollbar-width:none;
}

.tabs::-webkit-scrollbar{
  display:none;
}

.tab-btn{
  flex:0 0 auto;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--muted);
  border-radius:999px;
  padding:10px 14px;
  font-size:12px;
  font-weight:800;
  box-shadow:var(--shadow-sm);
  position:relative;
  overflow:hidden;
}

.tab-btn.active{
  background:var(--primary);
  color:#fff;
  border-color:var(--primary);
}

.section-title{
  font-size:14px;
  font-weight:800;
  margin:18px 0 10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.count{
  font-size:11px;
  color:var(--muted);
  font-weight:700;
}

.result-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.result-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  padding:14px;
  display:flex;
  gap:12px;
  align-items:flex-start;
  box-shadow:var(--shadow-sm);
  position:relative;
  overflow:hidden;
}

.result-icon{
  width:44px;
  height:44px;
  border-radius:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  font-size:17px;
}

.result-icon.sdki{
  background:var(--primary-light);
  color:var(--primary);
}

.result-icon.slki{
  background:#ecfdf5;
  color:var(--success);
}

.result-icon.siki{
  background:#fffbeb;
  color:var(--warning);
}

.result-body{
  flex:1;
  min-width:0;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:5px;
  border-radius:999px;
  padding:4px 8px;
  font-size:10px;
  font-weight:800;
  margin-bottom:6px;
}

.badge.sdki{
  background:var(--primary-light);
  color:var(--primary);
}

.badge.slki{
  background:#ecfdf5;
  color:var(--success);
}

.badge.siki{
  background:#fffbeb;
  color:#b45309;
}

.result-title{
  font-size:14px;
  font-weight:800;
  margin-bottom:4px;
  line-height:1.35;
}

.result-desc{
  font-size:12px;
  color:var(--muted);
  line-height:1.45;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.result-meta{
  font-size:11px;
  color:#94a3b8;
  margin-top:7px;
}

.chevron{
  color:#94a3b8;
  margin-top:13px;
}

.empty-state{
  text-align:center;
  padding:42px 18px;
  color:var(--muted);
}

.empty-icon{
  width:70px;
  height:70px;
  border-radius:24px;
  background:var(--primary-light);
  color:var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 14px;
  font-size:28px;
}

.empty-title{
  font-size:15px;
  font-weight:800;
  color:var(--text);
  margin-bottom:6px;
}

.empty-desc{
  font-size:12px;
  line-height:1.55;
}

.loading{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  color:var(--muted);
  font-size:13px;
  padding:30px 0;
}

.spinner{
  width:18px;
  height:18px;
  border:3px solid var(--primary-soft);
  border-top-color:var(--primary);
  border-radius:50%;
  animation:spin .8s linear infinite;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

.native-click{
  position:relative;
  overflow:hidden;
  cursor:pointer;
  touch-action:manipulation;
}

.native-click:active{
  transform:scale(.985);
}

.ripple{
  position:absolute;
  border-radius:50%;
  transform:scale(0);
  animation:ripple .55s linear;
  background:rgba(37,99,235,.18);
  pointer-events:none;
}

@keyframes ripple{
  to{
    transform:scale(4);
    opacity:0;
  }
}

.bottom-nav{
  position:fixed;
  left:50%;
  bottom:0;
  transform:translateX(-50%);
  width:100%;
  max-width:520px;
  height:calc(var(--bottom-nav-height) + env(safe-area-inset-bottom));
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-top:1px solid var(--border);
  display:grid;
  grid-template-columns:repeat(4,1fr);
  padding:8px 8px calc(8px + env(safe-area-inset-bottom));
  z-index:50;
}

.bottom-item{
  border:0;
  background:transparent;
  color:var(--muted);
  border-radius:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  font-size:11px;
  font-weight:700;
  position:relative;
  overflow:hidden;
}

.bottom-item i{
  font-size:18px;
}

.bottom-item.active{
  color:var(--primary);
  background:var(--primary-light);
}
  .inline-link{
  border:0;
  margin:8px 0 0;
  padding:8px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.18);
  color:#fff;
  font-size:12px;
  font-weight:800;
  display:inline-flex;
  align-items:center;
  gap:6px;
}

.inline-link i{
  font-size:11px;
}
</style>
</head>

<body>

<div class="app">

  <header class="header">
    <div class="topbar">
      <button class="nav-btn native-click" onclick="history.back()" aria-label="Kembali">
        <i class="fa-solid fa-arrow-left"></i>
      </button>

      <div class="header-title">
        <h1>Pencarian</h1>
        <p>SDKI, SLKI, SIKI, dan tautan intervensi</p>
      </div>
    </div>

    <label class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input id="searchInput" type="search" placeholder="Contoh: ansietas, sesak, nyeri, edukasi..." autocomplete="off">
      <button id="clearBtn" class="clear-btn native-click" type="button" aria-label="Hapus">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </label>
  </header>

  <main class="content">

    <section class="info-card">
  <div class="info-title">Cari lebih fleksibel</div>
  <div class="info-desc">
    Kamu bisa mencari berdasarkan nama diagnosis, luaran, intervensi, atau kata kunci klinis.
    Untuk pencarian diagnosis berdasarkan gejala pasien, gunakan menu
    <button class="inline-link native-click" type="button" onclick="location.href='cari-gejala.html'">
      Cari Gejala di sini
      <i class="fa-solid fa-arrow-right"></i>
    </button>
  </div>
</section>

    <div class="tabs">
      <button class="tab-btn active native-click" data-filter="all">Semua</button>
      <button class="tab-btn native-click" data-filter="sdki">SDKI</button>
      <button class="tab-btn native-click" data-filter="slki">SLKI</button>
      <button class="tab-btn native-click" data-filter="siki">SIKI</button>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <span>Memuat data...</span>
    </div>

    <div id="resultArea"></div>

  </main>
</div>

<nav class="bottom-nav">
  <a href="../index.html" class="bottom-item native-click">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>

  <a href="search.html" class="bottom-item active native-click">
    <i class="fa-solid fa-magnifying-glass"></i>
    <span>Cari</span>
  </a>

  <a href="quick-askep.html" class="bottom-item native-click">
    <i class="fa-solid fa-notes-medical"></i>
    <span>Askep</span>
  </a>

  <a href="profil.html" class="bottom-item native-click">
    <i class="fa-solid fa-user-nurse"></i>
    <span>Profil</span>
  </a>
</nav>
<script>
/* =========================
   CONFIG PATH
========================= */
const DATA_PATHS = {
  sdki: "../data/sdkislki/sdki.json",
  slki: "../data/sdkislki/slki.json",
  siki: "../data/sdkislki/siki.json",
  tautanSiki: "../data/tautansiki.json"
};

/* =========================
   STATE
========================= */
let DB = {
  sdki: [],
  slki: [],
  siki: [],
  tautanSiki: []
};

let SEARCH_INDEX = [];
let activeFilter = "all";

/* =========================
   ELEMENTS
========================= */
const searchInput = document.getElementById("searchInput");
const clearBtn = document.getElementById("clearBtn");
const resultArea = document.getElementById("resultArea");
const loadingEl = document.getElementById("loading");

/* =========================
   HELPERS
========================= */
function normalizeText(text){
  return String(text || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^\w\s.-]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function pick(obj, keys){
  for(const key of keys){
    if(obj && obj[key] !== undefined && obj[key] !== null && obj[key] !== ""){
      return obj[key];
    }
  }
  return "";
}

function toArray(data){
  if(Array.isArray(data)) return data;

  if(data && Array.isArray(data.data)) return data.data;
  if(data && Array.isArray(data.items)) return data.items;
  if(data && Array.isArray(data.diagnosis)) return data.diagnosis;
  if(data && Array.isArray(data.luaran)) return data.luaran;
  if(data && Array.isArray(data.intervensi)) return data.intervensi;

  if(data && typeof data === "object"){
    return Object.values(data);
  }

  return [];
}

function stringifyDeep(value){
  if(value === null || value === undefined) return "";
  if(typeof value === "string" || typeof value === "number") return String(value);
  if(Array.isArray(value)) return value.map(stringifyDeep).join(" ");
  if(typeof value === "object") return Object.values(value).map(stringifyDeep).join(" ");
  return "";
}

function getItemKey(item){
  return pick(item, ["id", "kode", "code", "nomor", "no"]);
}

function getItemCode(item){
  return pick(item, ["kode", "code", "nomor", "no", "id"]);
}
function getItemTitle(item){
  return pick(item, [
    "title",
    "judul",
    "nama",
    "diagnosis",
    "diagnosa",
    "luaran",
    "intervensi",
    "label",
    "name"
  ]);
}

function getItemDesc(item){
  return pick(item, [
    "definisi",
    "deskripsi",
    "description",
    "keterangan",
    "tujuan",
    "ekspektasi"
  ]);
}

function getDetailUrl(type, id){
  const safeId = encodeURIComponent(id || "");

  if(type === "sdki") return `diagnosis-detail.html?id=${safeId}`;
  if(type === "slki") return `slki-detail.html?id=${safeId}`;
  if(type === "siki") return `siki-detail.html?id=${safeId}`;

  return "#";
}

function getIcon(type){
  if(type === "sdki") return "fa-stethoscope";
  if(type === "slki") return "fa-chart-line";
  if(type === "siki") return "fa-hand-holding-medical";
  return "fa-file-medical";
}

function getTypeLabel(type){
  if(type === "sdki") return "SDKI";
  if(type === "slki") return "SLKI";
  if(type === "siki") return "SIKI";
  return type.toUpperCase();
}

/* =========================
   LOAD DATA
========================= */
async function fetchJsonSafe(path){
  try{
    const res = await fetch(path + "?v=" + Date.now());
    if(!res.ok) throw new Error("Gagal memuat " + path);
    return await res.json();
  }catch(err){
    console.warn(err.message);
    return [];
  }
}

async function loadAllData(){
  loadingEl.style.display = "flex";

  const [sdki, slki, siki, tautanSiki] = await Promise.all([
    fetchJsonSafe(DATA_PATHS.sdki),
    fetchJsonSafe(DATA_PATHS.slki),
    fetchJsonSafe(DATA_PATHS.siki),
    fetchJsonSafe(DATA_PATHS.tautanSiki)
  ]);

  DB.sdki = toArray(sdki);
  DB.slki = toArray(slki);
  DB.siki = toArray(siki);
  DB.tautanSiki = toArray(tautanSiki);

  buildSearchIndex();

  loadingEl.style.display = "none";

  const params = new URLSearchParams(location.search);
  const q = params.get("q") || "";
  if(q){
    searchInput.value = q;
    clearBtn.style.display = "flex";
    runSearch();
  }else{
    renderEmpty("Mulai pencarian", "Ketik kata kunci seperti ansietas, sesak, nyeri, mobilitas, atau edukasi.");
  }
}

/* =========================
   BUILD SEARCH INDEX
========================= */
function buildSearchIndex(){
  SEARCH_INDEX = [];

  DB.sdki.forEach(item => {
   const id = getItemKey(item);
const kode = getItemCode(item);
const title = getItemTitle(item);

    SEARCH_INDEX.push({
      type:"sdki",
      id,
      kode,
      title,
      desc:getItemDesc(item),
      raw:item,
      haystack:normalizeText([
        id,
        title,
        stringifyDeep(item)
      ].join(" "))
    });
  });

  DB.slki.forEach(item => {
    const id = getItemKey(item);
const kode = getItemCode(item);
const title = getItemTitle(item);

    SEARCH_INDEX.push({
      type:"slki",
      id,
      kode,
      title,
      desc:getItemDesc(item),
      raw:item,
      haystack:normalizeText([
        id,
        title,
        stringifyDeep(item)
      ].join(" "))
    });
  });

  DB.siki.forEach(item => {
    const id = getItemKey(item);
const kode = getItemCode(item);
const title = getItemTitle(item);

    SEARCH_INDEX.push({
      type:"siki",
      id,
      kode,
      title,
      desc:getItemDesc(item),
      raw:item,
      haystack:normalizeText([
        id,
        title,
        stringifyDeep(item)
      ].join(" "))
    });
  });
}

/* =========================
   SEARCH
========================= */
function scoreItem(item, keywords, query){
  let score = 0;

  const title = normalizeText(item.title);
  const id = normalizeText(item.id);
  const kode = normalizeText(item.kode);
  const desc = normalizeText(item.desc);
  const haystack = item.haystack;

  if(title === query) score += 100;
  if(title.includes(query)) score += 50;
  if(kode.includes(query)) score += 45;
  if(id.includes(query)) score += 30;
  if(desc.includes(query)) score += 20;

  keywords.forEach(word => {
    if(title.includes(word)) score += 20;
    if(kode.includes(word)) score += 14;
    if(id.includes(word)) score += 10;
    if(desc.includes(word)) score += 8;
    if(haystack.includes(word)) score += 4;
  });

  return score;
}

function runSearch(){
  const q = searchInput.value.trim();
  clearBtn.style.display = q ? "flex" : "none";

  const url = new URL(location.href);
  if(q){
    url.searchParams.set("q", q);
  }else{
    url.searchParams.delete("q");
  }
  history.replaceState(null, "", url);

  if(!q){
    renderEmpty("Mulai pencarian", "Ketik kata kunci seperti ansietas, sesak, nyeri, mobilitas, atau edukasi.");
    return;
  }

  const query = normalizeText(q);
  const stopwords = ["dan", "atau", "yang", "dengan", "pada", "di", "ke", "dari"];
  const keywords = query
    .split(" ")
    .filter(word => word.length > 1 && !stopwords.includes(word));

  let results = SEARCH_INDEX
    .filter(item => activeFilter === "all" || item.type === activeFilter)
    .map(item => ({
      ...item,
      score:scoreItem(item, keywords, query)
    }))
    .filter(item => item.score > 0)
    .sort((a,b) => b.score - a.score)
    .slice(0, 80);

  renderResults(results, q);
}

/* =========================
   RENDER
========================= */
function renderEmpty(title, desc){
  resultArea.innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">
        <i class="fa-solid fa-magnifying-glass"></i>
      </div>
      <div class="empty-title">${title}</div>
      <div class="empty-desc">${desc}</div>
    </div>
  `;
}

function renderResults(results, q){
  if(!results.length){
    renderEmpty("Tidak ditemukan", `Belum ada hasil untuk kata kunci "${escapeHtml(q)}". Coba gunakan kata lain.`);
    return;
  }

  const grouped = {
    sdki: results.filter(item => item.type === "sdki"),
    slki: results.filter(item => item.type === "slki"),
    siki: results.filter(item => item.type === "siki")
  };

  let html = "";

  if(activeFilter === "all"){
    html += renderGroup("Diagnosis SDKI", grouped.sdki);
    html += renderGroup("Luaran SLKI", grouped.slki);
    html += renderGroup("Intervensi SIKI", grouped.siki);
  }else{
    html += renderGroup(getTypeLabel(activeFilter), results);
  }

  resultArea.innerHTML = html;
}

function renderGroup(title, items){
  if(!items.length) return "";

  return `
    <section>
      <div class="section-title">
        <span>${title}</span>
        <span class="count">${items.length} hasil</span>
      </div>
      <div class="result-list">
        ${items.map(renderCard).join("")}
      </div>
    </section>
  `;
}

function renderCard(item){
  const type = item.type;
  const id = item.id || "";
  const kode = item.kode || "";
  const title = item.title || "Tanpa Judul";
  const desc = item.desc || "Ketuk untuk melihat detail lengkap.";
  const url = getDetailUrl(type, id);

  return `
    <a href="${url}" class="result-card native-click">
      <div class="result-icon ${type}">
        <i class="fa-solid ${getIcon(type)}"></i>
      </div>

      <div class="result-body">
        <div class="badge ${type}">${getTypeLabel(type)}</div>
        <div class="result-title">${escapeHtml(title)}</div>
        <div class="result-desc">${escapeHtml(desc)}</div>
       ${kode ? `<div class="result-meta">Kode: ${escapeHtml(kode)}</div>` : ""}
      </div>

      <i class="fa-solid fa-chevron-right chevron"></i>
    </a>
  `;
}

function escapeHtml(text){
  return String(text || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

/* =========================
   EVENTS
========================= */
let searchTimer = null;

searchInput.addEventListener("input", () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(runSearch, 180);
});

clearBtn.addEventListener("click", () => {
  searchInput.value = "";
  clearBtn.style.display = "none";
  searchInput.focus();
  runSearch();
});

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    runSearch();
  });
});

/* =========================
   RIPPLE EFFECT
========================= */
document.addEventListener("click", function(e){
  const el = e.target.closest(".native-click");
  if(!el) return;

  const oldRipple = el.querySelector(".ripple");
  if(oldRipple) oldRipple.remove();

  const ripple = document.createElement("span");
  ripple.className = "ripple";

  const rect = el.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);

  ripple.style.width = ripple.style.height = size + "px";
  ripple.style.left = (e.clientX - rect.left - size / 2) + "px";
  ripple.style.top = (e.clientY - rect.top - size / 2) + "px";

  el.appendChild(ripple);

  setTimeout(() => ripple.remove(), 600);
});

/* =========================
   BLOKIR SELECT
========================= */
document.addEventListener("selectstart", function(e){
  const allow = e.target.closest("input, textarea, select");
  if(!allow) e.preventDefault();
});

      </div>
    </div>
  `;
});
