<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Cari Berdasarkan Gejala</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --primary:#2563eb;
  --primary-dark:#1d4ed8;
  --primary-soft:#dbeafe;
  --primary-light:#eff6ff;

  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;

  --success:#16a34a;
  --warning:#f59e0b;
  --danger:#ef4444;

  --radius-sm:12px;
  --radius-md:18px;
  --radius-lg:24px;

  --shadow-sm:0 4px 14px rgba(15,23,42,.07);
  --shadow-md:0 10px 28px rgba(15,23,42,.10);

  --bottom-nav-height:76px;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  font-family:"Plus Jakarta Sans",system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  user-select:none;
  -webkit-user-select:none;
}

input,
textarea,
select{
  user-select:text;
  -webkit-user-select:text;
  font-family:inherit;
}

button,
a{
  font-family:inherit;
  text-decoration:none;
}

.app{
  min-height:100vh;
  padding-bottom:calc(var(--bottom-nav-height) + 24px);
}

.container{
  width:100%;
  max-width:720px;
  margin:0 auto;
  padding:16px;
}

/* HEADER */
.topbar{
  position:sticky;
  top:0;
  z-index:20;
  background:rgba(248,250,252,.92);
  backdrop-filter:blur(14px);
  padding:12px 16px 10px;
  border-bottom:1px solid rgba(226,232,240,.75);
}

.topbar-inner{
  max-width:720px;
  margin:0 auto;
  display:flex;
  align-items:center;
  gap:12px;
}

.back-btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:15px;
  background:var(--card);
  color:var(--primary);
  box-shadow:var(--shadow-sm);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:17px;
}

.top-title{
  flex:1;
  min-width:0;
}

.top-title h1{
  margin:0;
  font-size:18px;
  line-height:1.2;
  font-weight:800;
}

.top-title p{
  margin:3px 0 0;
  font-size:12px;
  color:var(--muted);
}

/* HERO */
.hero-card{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;
  border-radius:var(--radius-lg);
  padding:18px;
  box-shadow:0 16px 32px rgba(37,99,235,.22);
  margin-bottom:14px;
}

.hero-card h2{
  margin:0 0 6px;
  font-size:20px;
  font-weight:800;
}

.hero-card p{
  margin:0;
  font-size:13px;
  line-height:1.55;
  opacity:.92;
}

/* SEARCH */
.search-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:14px;
  box-shadow:var(--shadow-sm);
  margin-bottom:14px;
}

.search-box{
  display:flex;
  align-items:flex-start;
  gap:10px;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:18px;
  padding:12px 13px;
}

.search-box i{
  color:var(--primary);
  margin-top:3px;
}

.search-box textarea{
  width:100%;
  border:none;
  outline:none;
  background:transparent;
  resize:none;
  min-height:74px;
  color:var(--text);
  font-size:14px;
  line-height:1.5;
}

.search-box textarea::placeholder{
  color:#94a3b8;
}

.action-row{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.btn{
  border:none;
  border-radius:15px;
  min-height:44px;
  padding:0 14px;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  cursor:pointer;
}

.btn-primary{
  flex:1;
  background:var(--primary);
  color:#fff;
  box-shadow:0 10px 18px rgba(37,99,235,.20);
}

.btn-light{
  background:var(--primary-light);
  color:var(--primary);
}

.chip-wrap{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:12px;
}

.chip{
  border:none;
  background:var(--primary-light);
  color:var(--primary-dark);
  padding:8px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

/* STATUS */
.status{
  display:none;
  align-items:center;
  gap:9px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  padding:12px 14px;
  color:var(--muted);
  box-shadow:var(--shadow-sm);
  margin-bottom:14px;
  font-size:13px;
}

.status.show{
  display:flex;
}

.status i{
  color:var(--primary);
}

/* RESULT */
.result-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin:10px 2px 12px;
}

.result-head h3{
  margin:0;
  font-size:15px;
  font-weight:800;
}

.result-count{
  font-size:12px;
  color:var(--muted);
  font-weight:700;
}

.result-list{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.dx-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:14px;
  box-shadow:var(--shadow-sm);
  cursor:pointer;
  transition:.16s ease;
}

.dx-card:active{
  transform:scale(.985);
}

.dx-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
}

.dx-title{
  min-width:0;
}

.dx-title h4{
  margin:0;
  font-size:15px;
  font-weight:800;
  line-height:1.35;
}

.dx-code{
  display:inline-flex;
  margin-bottom:5px;
  padding:4px 8px;
  border-radius:999px;
  background:var(--primary-light);
  color:var(--primary-dark);
  font-size:11px;
  font-weight:800;
}

.score-badge{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:5px;
  padding:6px 9px;
  border-radius:999px;
  background:#ecfdf5;
  color:#15803d;
  font-size:11px;
  font-weight:800;
}

.meta-row{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  margin-top:9px;
}

.meta{
  font-size:11px;
  font-weight:700;
  color:var(--muted);
  background:#f1f5f9;
  padding:5px 8px;
  border-radius:999px;
}

.match-box{
  margin-top:11px;
  padding:10px;
  border-radius:15px;
  background:var(--primary-light);
  color:#1e3a8a;
  font-size:12px;
  line-height:1.5;
}

.match-box b{
  color:#1d4ed8;
}

.match-list{
  margin:6px 0 0;
  padding-left:17px;
}

.match-list li{
  margin:3px 0;
}

.empty{
  background:#fff;
  border:1px dashed #cbd5e1;
  border-radius:var(--radius-lg);
  padding:20px;
  text-align:center;
  color:var(--muted);
  margin-top:12px;
}

.empty i{
  width:48px;
  height:48px;
  border-radius:18px;
  background:var(--primary-light);
  color:var(--primary);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  margin-bottom:10px;
}

.empty h3{
  margin:0 0 6px;
  color:var(--text);
  font-size:16px;
}

.empty p{
  margin:0;
  font-size:13px;
  line-height:1.5;
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;
  left:50%;
  bottom:0;
  transform:translateX(-50%);
  width:100%;
  max-width:720px;
  height:var(--bottom-nav-height);
  background:rgba(255,255,255,.94);
  backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  display:grid;
  grid-template-columns:repeat(4,1fr);
  z-index:30;
  padding:7px 8px calc(7px + env(safe-area-inset-bottom));
}

.bottom-item{
  border:none;
  background:transparent;
  color:#94a3b8;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  border-radius:16px;
  font-size:11px;
  font-weight:700;
}

.bottom-item i{
  font-size:18px;
}

.bottom-item.active{
  background:var(--primary-light);
  color:var(--primary);
}

.native-click:active{
  transform:scale(.96);
}

@media(min-width:760px){
  .bottom-nav{
    border-left:1px solid var(--border);
    border-right:1px solid var(--border);
    border-radius:24px 24px 0 0;
  }
}
</style>
</head>

<body>
<div class="app">

  <header class="topbar">
    <div class="topbar-inner">
      <button class="back-btn native-click" onclick="history.back()" aria-label="Kembali">
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <div class="top-title">
        <h1>Cari Gejala</h1>
        <p>Temukan kemungkinan diagnosis SDKI</p>
      </div>
    </div>
  </header>

  <main class="container">

    <section class="hero-card">
      <h2>Cari diagnosis dari gejala pasien</h2>
      <p>
        Masukkan tanda/gejala yang ditemukan, misalnya:
        nyeri, mual, sesak napas, gelisah, tekanan darah meningkat.
      </p>
    </section>

    <section class="search-card">
      <div class="search-box">
        <i class="fa-solid fa-stethoscope"></i>
        <textarea id="symptomInput" placeholder="Tulis gejala pasien di sini...&#10;Contoh: pasien mengeluh nyeri dada, sesak, gelisah, nadi cepat"></textarea>
      </div>

      <div class="action-row">
        <button class="btn btn-primary native-click" id="searchBtn">
          <i class="fa-solid fa-magnifying-glass"></i>
          Cari Diagnosis
        </button>
        <button class="btn btn-light native-click" id="clearBtn" title="Bersihkan">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <div class="chip-wrap">
        <button class="chip native-click" data-example="nyeri akut, tampak meringis, sulit tidur">Nyeri</button>
        <button class="chip native-click" data-example="sesak napas, dispnea, penggunaan otot bantu napas">Sesak</button>
        <button class="chip native-click" data-example="mual, muntah, tidak nafsu makan">Mual</button>
        <button class="chip native-click" data-example="cemas, gelisah, sulit tidur, khawatir">Cemas</button>
      </div>
    </section>

    <div class="status show" id="statusBox">
      <i class="fa-solid fa-circle-info"></i>
      <span>Memuat data SDKI...</span>
    </div>

    <section>
      <div class="result-head">
        <h3>Hasil Pencarian</h3>
        <span class="result-count" id="resultCount">0 diagnosis</span>
      </div>

      <div class="result-list" id="resultList"></div>
    </section>

  </main>

  <nav class="bottom-nav">
    <button class="bottom-item native-click" onclick="location.href='../index.html'">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </button>

    <button class="bottom-item active native-click" onclick="location.href='search.html'">
      <i class="fa-solid fa-magnifying-glass"></i>
      <span>Cari</span>
    </button>

    <button class="bottom-item native-click" onclick="location.href='favorite.html'">
      <i class="fa-solid fa-bookmark"></i>
      <span>Favorit</span>
    </button>

    <button class="bottom-item native-click" onclick="location.href='profil.html'">
      <i class="fa-solid fa-user-nurse"></i>
      <span>Profil</span>
    </button>
  </nav>

</div>

<script>
const DATA_PATH = "https://askep.mkhoirulzed.workers.dev/api/sdki";

let SDKI = [];

const symptomInput = document.getElementById("symptomInput");
const searchBtn = document.getElementById("searchBtn");
const clearBtn = document.getElementById("clearBtn");
const statusBox = document.getElementById("statusBox");
const resultList = document.getElementById("resultList");
const resultCount = document.getElementById("resultCount");

function setStatus(message, show = true){
  statusBox.classList.toggle("show", show);
  statusBox.querySelector("span").textContent = message || "";
}

function normalizeText(text){
  return String(text || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^\w\s]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function tokenize(text){
  const stopWords = new Set([
    "dan","atau","yang","dengan","pada","dari","ke","di","ini","itu",
    "pasien","klien","mengeluh","merasa","terasa","ada","tampak",
    "terlihat","mengalami","keluhan","gejala"
  ]);

  return normalizeText(text)
    .split(" ")
    .filter(word => word.length >= 3 && !stopWords.has(word));
}

function uniqueArray(arr){
  return [...new Set(arr.filter(Boolean))];
}

function toArray(value){
  if(Array.isArray(value)) return value;
  if(!value) return [];
  if(typeof value === "string") return [value];

  if(typeof value === "object"){
    return Object.values(value).flatMap(v => toArray(v));
  }

  return [];
}

function getGejalaMayor(item){
  return uniqueArray([
    ...toArray(item.gejalaMayor),
    ...toArray(item.tandaGejalaMayor),
    ...toArray(item.tanda_dan_gejala_mayor),
    ...toArray(item.tandaMayor),
    ...toArray(item.mayor)
  ]);
}

function getGejalaMinor(item){
  return uniqueArray([
    ...toArray(item.gejalaMinor),
    ...toArray(item.tandaGejalaMinor),
    ...toArray(item.tanda_dan_gejala_minor),
    ...toArray(item.tandaMinor),
    ...toArray(item.minor)
  ]);
}

function buildSearchSources(item){
  const mayor = getGejalaMayor(item);
  const minor = getGejalaMinor(item);

  const penyebab = uniqueArray([
    ...toArray(item.penyebab),
    ...toArray(item.etiologi)
  ]);

  const kondisiKlinis = uniqueArray([
    ...toArray(item.kondisiKlinis),
    ...toArray(item.kondisi_klinis)
  ]);

  return {
    mayor,
    minor,
    penyebab,
    kondisiKlinis
  };
}

function matchDiagnosis(item, query){
  const queryTokens = tokenize(query);
  const sources = buildSearchSources(item);

  const mayorText = normalizeText(sources.mayor.join(" "));
  const minorText = normalizeText(sources.minor.join(" "));
  const penyebabText = normalizeText(sources.penyebab.join(" "));
  const kondisiText = normalizeText(sources.kondisiKlinis.join(" "));
  const namaText = normalizeText(`${item.nama || ""} ${item.judul || ""} ${item.definisi || ""}`);

  let score = 0;
  const matchedMayor = [];
  const matchedMinor = [];
  const matchedOther = [];

  queryTokens.forEach(token => {
    if(mayorText.includes(token)){
      score += 5;
      matchedMayor.push(token);
    }

    if(minorText.includes(token)){
      score += 3;
      matchedMinor.push(token);
    }

    if(penyebabText.includes(token) || kondisiText.includes(token) || namaText.includes(token)){
      score += 1;
      matchedOther.push(token);
    }
  });

  const fullQuery = normalizeText(query);

  sources.mayor.forEach(g => {
    const ng = normalizeText(g);
    if(ng && (fullQuery.includes(ng) || ng.includes(fullQuery))){
      score += 8;
      matchedMayor.push(g);
    }
  });

  sources.minor.forEach(g => {
    const ng = normalizeText(g);
    if(ng && (fullQuery.includes(ng) || ng.includes(fullQuery))){
      score += 5;
      matchedMinor.push(g);
    }
  });

  return {
    item,
    score,
    matchedMayor: uniqueArray(matchedMayor),
    matchedMinor: uniqueArray(matchedMinor),
    matchedOther: uniqueArray(matchedOther)
  };
}

function highlightMatchedSymptoms(symptoms, tokens, max = 4){
  const normalizedTokens = tokens.map(normalizeText);

  return symptoms
    .filter(symptom => {
      const ns = normalizeText(symptom);
      return normalizedTokens.some(t => ns.includes(t) || t.includes(ns));
    })
    .slice(0, max);
}

function getDetailUrl(item){
  const key = item.id || item.kode || item.nama || item.judul || "";
  return `diagnosis-detail.html?id=${encodeURIComponent(key)}`;
}

function renderEmpty(title, message, icon = "fa-magnifying-glass"){
  resultList.innerHTML = `
    <div class="empty">
      <i class="fa-solid ${icon}"></i>
      <h3>${title}</h3>
      <p>${message}</p>
    </div>
  `;
  resultCount.textContent = "0 diagnosis";
}

function renderResults(results, query){
  if(!query.trim()){
    renderEmpty(
      "Masukkan gejala terlebih dahulu",
      "Contoh: nyeri dada, sesak napas, gelisah, sulit tidur.",
      "fa-keyboard"
    );
    return;
  }

  if(!results.length){
    renderEmpty(
      "Belum ada diagnosis yang cocok",
      "Coba gunakan kata kunci lain atau masukkan beberapa gejala sekaligus.",
      "fa-circle-exclamation"
    );
    return;
  }

  resultCount.textContent = `${results.length} diagnosis`;

  resultList.innerHTML = results.map(result => {
    const item = result.item;
    const sources = buildSearchSources(item);

    const mayorHits = highlightMatchedSymptoms(
      sources.mayor,
      [...result.matchedMayor, ...tokenize(query)]
    );

    const minorHits = highlightMatchedSymptoms(
      sources.minor,
      [...result.matchedMinor, ...tokenize(query)]
    );

    const nama = item.nama || item.judul || "Diagnosis tanpa nama";
    const kode = item.kode || "-";
    const kategori = item.kategori || "Tanpa kategori";
    const subkategori = item.subkategori || item.subKategori || "";

    const matchItems = [];

    if(mayorHits.length){
      matchItems.push(`
        <b>Mayor:</b>
        <ul class="match-list">
          ${mayorHits.map(x => `<li>${escapeHtml(x)}</li>`).join("")}
        </ul>
      `);
    }

    if(minorHits.length){
      matchItems.push(`
        <b>Minor:</b>
        <ul class="match-list">
          ${minorHits.map(x => `<li>${escapeHtml(x)}</li>`).join("")}
        </ul>
      `);
    }

    if(!matchItems.length){
      matchItems.push(`<b>Kata cocok:</b> ${escapeHtml(uniqueArray([
        ...result.matchedMayor,
        ...result.matchedMinor,
        ...result.matchedOther
      ]).slice(0, 8).join(", "))}`);
    }

    return `
      <article class="dx-card native-click" onclick="location.href='${getDetailUrl(item)}'">
        <div class="dx-top">
          <div class="dx-title">
            <span class="dx-code">${escapeHtml(kode)}</span>
            <h4>${escapeHtml(nama)}</h4>
          </div>
          <div class="score-badge">
            <i class="fa-solid fa-check"></i>
            ${result.score}
          </div>
        </div>

        <div class="meta-row">
          <span class="meta">${escapeHtml(kategori)}</span>
          ${subkategori ? `<span class="meta">${escapeHtml(subkategori)}</span>` : ""}
        </div>

        <div class="match-box">
          ${matchItems.join("")}
        </div>
      </article>
    `;
  }).join("");
}

function escapeHtml(text){
  return String(text ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function doSearch(){
  const query = symptomInput.value.trim();

  if(!SDKI.length){
    renderEmpty(
      "Data SDKI belum tersedia",
      "Pastikan file data/sdkislki/sdki.json sudah ada dan bisa diakses.",
      "fa-database"
    );
    return;
  }

  const results = SDKI
    .map(item => matchDiagnosis(item, query))
    .filter(result => result.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 30);

  renderResults(results, query);
}

async function loadData(){
  try{
    setStatus("Memuat data SDKI...");

    const res = await fetch(DATA_PATH, { cache:"no-store" });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();

    if(Array.isArray(data)){
      SDKI = data;
    }else if(Array.isArray(data.data)){
      SDKI = data.data;
    }else if(Array.isArray(data.sdkis)){
      SDKI = data.sdkis;
    }else{
      SDKI = [];
    }

    setStatus(`Data SDKI siap digunakan: ${SDKI.length} diagnosis.`, true);

    setTimeout(() => {
      setStatus("", false);
    }, 1800);

    renderEmpty(
      "Masukkan gejala pasien",
      "Sistem akan mencocokkan dengan tanda/gejala mayor dan minor pada sdki.json.",
      "fa-stethoscope"
    );

  }catch(err){
    console.error(err);
    setStatus("Gagal memuat data SDKI. Periksa path data/sdkislki/sdki.json.", true);
    renderEmpty(
      "Gagal memuat data",
      "Pastikan file sdki.json berada di data/sdkislki/sdki.json dan halaman dibuka melalui server, bukan langsung file lokal.",
      "fa-triangle-exclamation"
    );
  }
}

searchBtn.addEventListener("click", doSearch);

symptomInput.addEventListener("keydown", e => {
  if(e.key === "Enter" && (e.ctrlKey || e.metaKey)){
    doSearch();
  }
});

symptomInput.addEventListener("input", () => {
  clearTimeout(window.__symptomTimer);
  window.__symptomTimer = setTimeout(doSearch, 400);
});

clearBtn.addEventListener("click", () => {
  symptomInput.value = "";
  renderEmpty(
    "Masukkan gejala pasien",
    "Contoh: nyeri dada, sesak napas, gelisah, sulit tidur.",
    "fa-stethoscope"
  );
  symptomInput.focus();
});

document.querySelectorAll(".chip").forEach(chip => {
  chip.addEventListener("click", () => {
    symptomInput.value = chip.dataset.example || "";
    doSearch();
  });
});

loadData();
</script>
</body>
</html>
