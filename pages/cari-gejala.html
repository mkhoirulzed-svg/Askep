<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Cari Berdasarkan Gejala</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="../styles/global.css">
<link rel="stylesheet" href="../styles/layout.css">
<link rel="stylesheet" href="../styles/components.css">
<link rel="stylesheet" href="../styles/responsive.css">
<link rel="stylesheet" href="../styles/cari-gejala.css">
</head>

<body class="page-cari-gejala">
<div class="app">

  <header class="topbar">
    <div class="topbar-inner">
      <button
        class="back-btn native-click"
        onclick="history.back()"
        aria-label="Kembali"
      >
        <i class="fa-solid fa-chevron-left"></i>
      </button>

      <div class="top-title">
        <h1>Cari Gejala</h1>
        <p>Temukan kemungkinan diagnosis SDKI</p>
      </div>
    </div>
  </header>

  <main class="container">

    <div class="search-column">
      <section class="hero-card">
        <h2>Cari diagnosis dari gejala pasien</h2>
        <p>
          Masukkan tanda atau gejala yang ditemukan, misalnya nyeri,
          mual, sesak napas, gelisah, atau tekanan darah meningkat.
        </p>
      </section>

      <section class="search-card">
        <div class="search-box">
          <i class="fa-solid fa-stethoscope"></i>

          <textarea
            id="symptomInput"
            placeholder="Tulis gejala pasien di sini...&#10;Contoh: pasien mengeluh nyeri dada, sesak, gelisah, nadi cepat"
          ></textarea>
        </div>

        <div class="action-row">
          <button class="btn btn-primary native-click" id="searchBtn">
            <i class="fa-solid fa-magnifying-glass"></i>
            <span>Cari Diagnosis</span>
          </button>

          <button
            class="btn btn-light native-click"
            id="clearBtn"
            type="button"
            title="Bersihkan"
            aria-label="Bersihkan pencarian"
          >
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <div class="chip-wrap">
          <button
            class="chip native-click"
            type="button"
            data-example="nyeri akut, tampak meringis, sulit tidur"
          >
            Nyeri
          </button>

          <button
            class="chip native-click"
            type="button"
            data-example="sesak napas, dispnea, penggunaan otot bantu napas"
          >
            Sesak
          </button>

          <button
            class="chip native-click"
            type="button"
            data-example="mual, muntah, tidak nafsu makan"
          >
            Mual
          </button>

          <button
            class="chip native-click"
            type="button"
            data-example="cemas, gelisah, sulit tidur, khawatir"
          >
            Cemas
          </button>
        </div>
      </section>
    </div>

    <div class="result-column">
      <div class="status show" id="statusBox">
        <i class="fa-solid fa-circle-info"></i>
        <span>Memuat data SDKI...</span>
      </div>

      <section class="result-section">
        <div class="result-head">
          <h3>Hasil Pencarian</h3>
          <span class="result-count" id="resultCount">
            0 diagnosis
          </span>
        </div>

        <div class="result-list" id="resultList"></div>
      </section>
    </div>

  </main>

  <nav class="bottom-nav" aria-label="Navigasi utama">
    <a href="../index.html" class="bottom-item native-click">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </a>

    <a href="search.html" class="bottom-item active native-click">
      <i class="fa-solid fa-magnifying-glass"></i>
      <span>Cari</span>
    </a>

    <a href="quick-askep.html" class="bottom-item native-click">
    <i class="fa-solid fa-notes-medical"></i>
    <span>Askep</span>
  </a>

    <a href="profil.html" class="bottom-item native-click">
      <i class="fa-solid fa-user-nurse"></i>
      <span>Profil</span>
    </a>
  </nav>

</div>

<script src="../scripts/cari-gejala.js" defer></script>
</body>
</html>
